      // Print slip by activating print-slip-mode or print-thermal-mode
      function printSlip() {
        const format = document.getElementById('slip-print-format-select').value;
        const printContainer = document.getElementById('slip-print-container');
        
        let printClass = 'print-slip-mode';
        if (format === '80mm') {
          printContainer.innerHTML = buildThermalSlipHtml(state.currentSlipType, state.currentSlipDate, state.currentSlipAmount, state.currentSlipNote, state.currentSlipIndex);
          printClass = 'print-thermal-80mm-mode';
        } else if (format === '58mm') {
          printContainer.innerHTML = buildThermalSlipHtml(state.currentSlipType, state.currentSlipDate, state.currentSlipAmount, state.currentSlipNote, state.currentSlipIndex);
          printClass = 'print-thermal-58mm-mode';
        } else {
          printContainer.innerHTML = buildSlipHtml(state.currentSlipType, state.currentSlipDate, state.currentSlipAmount, state.currentSlipNote, state.currentSlipIndex);
          printClass = 'print-slip-mode';
        }
        
        document.body.classList.add(printClass);
        window.print();
        setTimeout(function() {
          document.body.classList.remove('print-slip-mode', 'print-thermal-80mm-mode', 'print-thermal-58mm-mode');
          printContainer.innerHTML = '';
        }, 1000);
      }

      // =========================================================================
      // CASH HOME / BANK HISTORY INDEX
      // =========================================================================
      function openCashHistoryIndex(type) {
        const isHome = type === 'home';
        const panelId = isHome ? 'cash-home-index' : 'cash-bank-index';
        const listId  = isHome ? 'cash-home-index-list' : 'cash-bank-index-list';
        const amtKey  = isHome ? 'cashSendToHome' : 'cashDepositToBank';
        const noteKey = isHome ? 'cashSendToHomeNote' : 'cashDepositToBankNote';
        const amtInputId  = isHome ? 'cash-home' : 'cash-bank';
        const noteInputId = isHome ? 'cash-home-note' : 'cash-bank-note';
        const accentColor = isHome ? '#7c3aed' : '#2563eb';
        const bgColor     = isHome ? '#fdf4ff' : '#eff6ff';
        const borderColor = isHome ? '#e9d5ff' : '#bfdbfe';

        const panel = document.getElementById(panelId);
        const listEl = document.getElementById(listId);

        // Toggle: close if already open
        if (panel.style.display !== 'none') {
          panel.style.display = 'none';
          return;
        }

        // Close the opposite panel if open
        const otherId = isHome ? 'cash-bank-index' : 'cash-home-index';
        document.getElementById(otherId).style.display = 'none';

        // Gather records from localStorage
        const dates = JSON.parse(localStorage.getItem('rojnamcha_saved_dates') || '[]');
        const entries = [];

        dates.forEach(function(dStr) {
          const rec = JSON.parse(localStorage.getItem('rojnamcha_record_' + dStr) || '{}');
          const summary = rec.summary || {};
          const amt = parseFloat(summary[amtKey]) || 0;
          if (amt > 0) {
            entries.push({
              date: dStr,
              amount: amt,
              note: summary[noteKey] || ''
            });
          }
        });

        // Sort newest first
        entries.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });

        listEl.innerHTML = '';

        if (entries.length === 0) {
          listEl.innerHTML = '<div style="padding:1.25rem;text-align:center;font-size:0.85rem;color:var(--text-muted);">No previous entries found.<br><small>Save a ledger with a cash transfer first.</small></div>';
        } else {
          entries.forEach(function(entry) {
            const row = document.createElement('div');
            row.style.cssText = 'padding:0.6rem 0.75rem;border-bottom:1px solid ' + borderColor + ';cursor:pointer;display:flex;flex-direction:column;gap:0.2rem;transition:background 0.15s;';
            row.innerHTML =
              '<div style="display:flex;justify-content:space-between;align-items:center;">' +
                '<span style="font-size:0.8rem;font-weight:600;color:var(--text-muted);">' + formatDateReadable(entry.date) + '</span>' +
                '<span style="font-size:0.95rem;font-weight:800;font-family:monospace;color:' + accentColor + ';">\u20b9' + entry.amount.toLocaleString('en-IN', { minimumFractionDigits: 2 }) + '</span>' +
              '</div>' +
              (entry.note ? '<div style="font-size:0.78rem;color:var(--text-muted);font-style:italic;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">' + entry.note + '</div>' : '');

            row.addEventListener('mouseenter', function() { row.style.background = bgColor; });
            row.addEventListener('mouseleave', function() { row.style.background = ''; });

            row.addEventListener('click', function() {
              document.getElementById(amtInputId).value = entry.amount.toFixed(2);
              document.getElementById(noteInputId).value = entry.note;
              calculateAll();
              panel.style.display = 'none';
              showToast('Filled: \u20b9' + entry.amount.toLocaleString('en-IN') + (entry.note ? ' \u2014 ' + entry.note : ''), 'success');
            });

            listEl.appendChild(row);
          });

          // Footer count
          const footer = document.createElement('div');
          footer.style.cssText = 'padding:0.4rem 0.75rem;background:var(--header-bg);font-size:0.75rem;color:var(--text-muted);text-align:center;border-top:1px solid ' + borderColor + ';';
          footer.textContent = entries.length + ' saved entr' + (entries.length === 1 ? 'y' : 'ies') + ' found \u2014 click any row to fill';
          listEl.appendChild(footer);
        }

        panel.style.display = 'block';

        // Close on outside click
        setTimeout(function() {
          function outsideClick(e) {
            if (!panel.contains(e.target) && e.target.id !== 'btn-home-history' && e.target.id !== 'btn-bank-history') {
              panel.style.display = 'none';
              document.removeEventListener('click', outsideClick);
            }
          }
          document.addEventListener('click', outsideClick);
        }, 50);
      }

      // Load quick-note chips from past saved records into the note panel
      function loadNotePanelChips(type) {
        const isHome = type === 'home';
        const chipsEl = document.getElementById('cash-' + type + '-chips');
        const noteInputId = 'cash-' + type + '-note';
        const amtKey  = isHome ? 'cashSendToHome' : 'cashDepositToBank';
        const noteKey = isHome ? 'cashSendToHomeNote' : 'cashDepositToBankNote';
        const accentColor = isHome ? '#7c3aed' : '#2563eb';
        const bgColor     = isHome ? '#fdf4ff' : '#eff6ff';
        const borderColor = isHome ? '#c4b5fd' : '#93c5fd';

        if (!chipsEl) return;

        const dates = JSON.parse(localStorage.getItem('rojnamcha_saved_dates') || '[]');
        const notesSeen = new Set();
        const chips = [];

        // Sort newest first
        const sortedDates = [...dates].sort(function(a, b) { return new Date(b) - new Date(a); });

        sortedDates.forEach(function(dStr) {
          const rec = JSON.parse(localStorage.getItem('rojnamcha_record_' + dStr) || '{}');
          const summary = rec.summary || {};
          const amt = parseFloat(summary[amtKey]) || 0;
          const note = (summary[noteKey] || '').trim();

          if (amt > 0 && note && !notesSeen.has(note)) {
            notesSeen.add(note);
            chips.push({ note: note, amount: amt, date: dStr });
          }
        });

        chipsEl.innerHTML = '';

        if (chips.length === 0) {
          chipsEl.innerHTML = '<span style="font-size:0.72rem;color:var(--text-muted);font-style:italic;">No past notes &mdash; type your note above</span>';
          return;
        }

        // Render chips label
        const label = document.createElement('span');
        label.style.cssText = 'font-size:0.7rem;color:var(--text-muted);font-weight:700;letter-spacing:0.04em;width:100%;display:block;margin-bottom:0.2rem;';
        label.textContent = 'QUICK FILL \u2014 PAST NOTES:';
        chipsEl.appendChild(label);

        chips.slice(0, 8).forEach(function(chip) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.style.cssText = 'background:' + bgColor + ';border:1px solid ' + borderColor + ';color:' + accentColor + ';border-radius:1rem;padding:0.2rem 0.65rem;font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis;transition:all 0.15s ease;';
          btn.title = chip.note + ' (\u20b9' + chip.amount.toLocaleString('en-IN') + ' on ' + formatDateReadable(chip.date) + ')';
          btn.textContent = chip.note;

          btn.addEventListener('mouseenter', function() {
            btn.style.background = accentColor;
            btn.style.color = 'white';
          });
          btn.addEventListener('mouseleave', function() {
            btn.style.background = bgColor;
            btn.style.color = accentColor;
          });
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById(noteInputId).value = chip.note;
            // Also fill amount if it is currently 0
            const amtEl = document.getElementById('cash-' + type);
            if (!amtEl.value || parseFloat(amtEl.value) === 0) {
              amtEl.value = chip.amount.toFixed(2);
              calculateAll();
            }
            showToast('\u2713 Note filled: ' + chip.note, 'success');
          });

          chipsEl.appendChild(btn);
        });
      }

      // =========================================================================
      // CASH DRAWER RECONCILIATION
      // =========================================================================
      const DENOMINATIONS = [
        { value: 500, label: '₹500' },
        { value: 200, label: '₹200' },
        { value: 100, label: '₹100' },
        { value: 50, label: '₹50' },
        { value: 20, label: '₹20' },
        { value: 10, label: '₹10' },
        { value: 5, label: '₹5' },
        { value: 2, label: '₹2' },
        { value: 1, label: '₹1' },
        { value: 1, label: 'Coins', isCoin: true }
      ];

      function renderDrawerTable() {
        const tbody = document.getElementById('drawer-tbody');
        if (!tbody) return;
        tbody.innerHTML = '';
        DENOMINATIONS.forEach(function(denom, index) {
          const tr = document.createElement('tr');
          const label = denom.isCoin ? 'Coins (₹1)' : denom.label;
          tr.innerHTML = `
            <td style="font-weight: 600; color: var(--text-dark);">${label}</td>
            <td>
              <input type="number" min="0" class="drawer-count-input" id="drawer-count-${index}" data-value="${denom.value}" value="0" oninput="calcDrawerTotal()">
            </td>
            <td style="text-align: right; font-weight: 700; font-family: monospace; color: var(--text-dark);" id="drawer-row-total-${index}">₹0.00</td>
          `;
          tbody.appendChild(tr);
        });
      }

      function calcDrawerTotal() {
        let grandTotal = 0;
        DENOMINATIONS.forEach(function(denom, index) {
          const input = document.getElementById('drawer-count-' + index);
          if (!input) return;
          const count = parseInt(input.value) || 0;
          const rowTotal = count * denom.value;
          grandTotal += rowTotal;
          const rowTotalEl = document.getElementById('drawer-row-total-' + index);
          if (rowTotalEl) {
            rowTotalEl.textContent = '₹' + rowTotal.toLocaleString('en-IN', { minimumFractionDigits: 2 });
          }
        });
        const totalDisplay = document.getElementById('drawer-total-display');
        if (totalDisplay) {
          totalDisplay.textContent = '₹' + grandTotal.toLocaleString('en-IN', { minimumFractionDigits: 2 });
        }
        return grandTotal;
      }

      // Helper to parse existing note and restore denomination counts in the drawer inputs
      function populateDrawerFromNote(noteStr) {
        if (!noteStr) return false;
        const match = noteStr.match(/^\[(.*?)\]/);
        if (!match) return false;
        
        const breakdownStr = match[1];
        const items = breakdownStr.split(',').map(s => s.trim());
        
        // Reset drawer counts to 0 first
        DENOMINATIONS.forEach(function(denom, index) {
          const input = document.getElementById('drawer-count-' + index);
          if (input) input.value = 0;
        });
        
        let foundAny = false;
        items.forEach(item => {
          const parts = item.split('x').map(s => s.trim());
          if (parts.length === 2) {
            const isCoin = parts[0].toLowerCase() === 'coins';
            const denomVal = isCoin ? 1 : parseFloat(parts[0]);
            const countVal = parseInt(parts[1]);
            
            if (!isNaN(denomVal) && !isNaN(countVal)) {
              // Find matching denomination index
              const idx = DENOMINATIONS.findIndex(d => {
                if (isCoin) return d.isCoin;
                return d.value === denomVal && !d.isCoin;
              });
              
              if (idx > -1) {
                const input = document.getElementById('drawer-count-' + idx);
                if (input) {
                  input.value = countVal;
                  foundAny = true;
                }
              }
            }
          }
        });
        
        return foundAny;
      }

        } else {

          if (headerEl) headerEl.style.background = 'linear-gradient(135deg, #2563eb, #1d4ed8)';
          if (section) section.style.borderColor = '#2563eb';
        }

        // Load existing values if they already exist in the input
        let currentAmt = 0;
        let currentNote = '';

        if (type === 'bank-ledger') {
          currentAmt = parseFloat(document.getElementById('bank-deposit-amount').value) || 0;
          currentNote = document.getElementById('bank-deposit-note').value.trim();
        } else if (breakdownRowIndex !== undefined && breakdownRowIndex !== null) {
          // Opened from a breakdown row
          const entries = state.breakdowns[type] || [];
          const idx = breakdownRowIndex - 1;
          if (entries[idx]) {
            currentAmt = entries[idx].amount || 0;
            currentNote = entries[idx].note || '';
          }
        } else {
          // Opened from main card
          currentAmt = parseFloat(document.getElementById('cash-' + type).value) || 0;
          currentNote = document.getElementById('cash-' + type + '-note').value.trim();
        }

        // Try to parse and populate counts from the note first
        const populatedFromNote = populateDrawerFromNote(currentNote);

        if (populatedFromNote) {
          // If populated from note, extract clean note text to show in the note input
          const parsed = parseDenominationsFromNote(currentNote);
          document.getElementById('drawer-note-input').value = parsed ? parsed.cleanNote : '';
          calcDrawerTotal();
        } else {
          // Fallback to normal behavior if note doesn't contain bracket denominations
          document.getElementById('drawer-note-input').value = currentNote;
          const drawerSum = calcDrawerTotal();
          if (Math.abs(drawerSum - currentAmt) > 0.01) {
            clearDrawer();
            document.getElementById('drawer-note-input').value = currentNote;
            calcDrawerTotal();
          }
        }
      }

        if (modal) {

        state.drawerTargetType = null;
        state.drawerTargetRowIndex = null;

      function clearDrawer() {
        DENOMINATIONS.forEach(function(denom, index) {
          const input = document.getElementById('drawer-count-' + index);
          if (input) input.value = 0;
        });
        document.getElementById('drawer-note-input').value = '';
        calcDrawerTotal();
      }

      function fillDrawerAmount() {
        const total = calcDrawerTotal();
        const noteText = document.getElementById('drawer-note-input').value.trim();
        const type = state.drawerTargetType; // 'home' or 'bank'
        const breakdownRowIndex = state.drawerTargetRowIndex;
        
        if (!type) {
          showToast('No target card selected for drawer fill', 'error');
          return;
        }

        // Gather denominations used
        const breakdownParts = [];
        DENOMINATIONS.forEach(function(denom, index) {
          const input = document.getElementById('drawer-count-' + index);
          if (input) {
            const count = parseInt(input.value) || 0;
            if (count > 0) {
              const label = denom.isCoin ? 'Coins' : denom.value.toString();
              breakdownParts.push(label + 'x' + count);
            }
          }
        });
        const breakdownStr = breakdownParts.join(', ');

        let finalNote = '';
        if (breakdownStr) {
          finalNote = '[' + breakdownStr + ']';
          if (noteText) {
            finalNote += ' ' + noteText;
          }
        } else {
          finalNote = noteText;
        }

        if (type === 'bank-ledger') {
          const amtInput = document.getElementById('bank-deposit-amount');
          if (amtInput) {
            amtInput.value = total.toFixed(2);
          }
          const noteInput = document.getElementById('bank-deposit-note');
          if (noteInput) {
            noteInput.value = finalNote;
          }
          closeCashDrawer();
          showToast(`Filled ₹${total.toLocaleString('en-IN')} to Bank Deposit`, 'success');
          return;
        }

        if (breakdownRowIndex !== undefined && breakdownRowIndex !== null) {
          // Target is a breakdown row
          const tbody = document.getElementById('breakdown-tbody');
          if (tbody) {
            const row = tbody.rows[breakdownRowIndex - 1];
            if (row) {
              const amtInput = row.querySelector('.breakdown-amount-input');
              const noteInput = row.querySelector('.breakdown-note-input');
              if (amtInput) amtInput.value = total.toFixed(2);
              if (noteInput) noteInput.value = finalNote;
              
              // Update state and sum
              saveBreakdownInputs();
              updateBreakdownTotal();
            }
          }
        } else {
          // Target is the main card
          const amtInput = document.getElementById('cash-' + type);
          if (amtInput) {
            amtInput.value = total.toFixed(2);
          }

          const noteInput = document.getElementById('cash-' + type + '-note');
          if (noteInput) {
            noteInput.value = finalNote;
          }

          const notePanel = document.getElementById('cash-' + type + '-note-panel');
          if (notePanel) {
            notePanel.style.display = 'block';
          }

          calculateAll();
        }

        // Close the drawer modal
        closeCashDrawer();

        showToast(`Filled ₹${total.toLocaleString('en-IN')} to Cash ${type === 'home' ? 'Home' : 'Bank'}`, 'success');
      }

          modalTitle.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Send to Home Breakdown`;

        }
        
        // Parse from input note to ensure we get any manual updates
        const noteInputEl = document.getElementById('cash-' + type + '-note');
        const noteVal = noteInputEl ? noteInputEl.value.trim() : '';
        const parsed = parseMultipleTransfers(noteVal);
        
        state.breakdowns[type] = parsed.entries;
        generalNoteInput.value = parsed.generalNote;
        
        // If parsed is empty but there's a value, initialize with main card values

          }

      function saveBreakdownInputs() {
        const type = state.currentBreakdownType;

      function applyBreakdown() {
        const type = state.currentBreakdownType;
        saveBreakdownInputs();
        
        const entries = state.breakdowns[type];
        const generalNote = document.getElementById('breakdown-general-note').value.trim();
        
        // Sum total amount
        let totalAmount = 0;
        entries.forEach(e => {
          totalAmount += e.amount;
        });
        
        // Update main page input fields
        document.getElementById('cash-' + type).value = totalAmount.toFixed(2);
        
        const formattedNote = formatMultipleTransfers(entries, generalNote);
        const noteEl = document.getElementById('cash-' + type + '-note');
        if (noteEl) noteEl.value = formattedNote;
        
        calculateAll();
        closeBreakdownModal();
        showToast('Breakdown applied successfully!', 'success');

      function parseMultipleTransfers(noteStr) {
        noteStr = noteStr || '';
        const match = noteStr.match(/^\[Breakdown:\s*(.*?)\]\s*(.*)$/s);
        if (match) {
          const breakdownStr = match[1];
          const generalNote = match[2].trim();
          const entries = [];
          const items = breakdownStr.split(';').map(s => s.trim()).filter(Boolean);
          items.forEach(item => {
            const dashIdx = item.indexOf(' - ');
            if (dashIdx !== -1) {
              const amount = parseFloat(item.substring(0, dashIdx).trim()) || 0;
              const note = item.substring(dashIdx + 3).trim();
              entries.push({ amount: amount, note: note });
            } else {
              const amount = parseFloat(item) || 0;
              const note = item.replace(/^[0-9.]+\s*/, '').trim();
              entries.push({ amount: amount, note: note });
            }
          });
          return { entries: entries, generalNote: generalNote };
        }
        return { entries: [], generalNote: noteStr.trim() };
      }

      function formatMultipleTransfers(entries, generalNote) {
        if (!entries || entries.length === 0) {
          return (generalNote || '').trim();
        }
        const breakdownParts = entries
          .filter(e => parseFloat(e.amount) > 0)
          .map(e => `${parseFloat(e.amount).toFixed(2)} - ${(e.note || '').replace(/[;\[\]]/g, ' ').trim()}`);
        if (breakdownParts.length === 0) {
          return (generalNote || '').trim();
        }
        const breakdownStr = `[Breakdown: ${breakdownParts.join('; ')}]`;
        return generalNote && generalNote.trim() ? `${breakdownStr} ${generalNote.trim()}` : breakdownStr;
      }

      // Print all slips/challans inside the generated audit date range sequentially
      function printAllRangeSlips(type) {
        const records = type === 'home' ? state.auditHomeRecords : state.auditBankRecords;
        if (!records || records.length === 0) {
          showToast('No records found to print.', 'error');
          return;
        }
        
        let stackedHtml = '';
        records.forEach((rec, idx) => {
          stackedHtml += buildSlipHtml(type, rec.date, rec.amount, rec.note, idx + 1);
        });
        
        const printContainer = document.getElementById('slip-print-container');
        printContainer.innerHTML = stackedHtml;
        
        document.body.classList.add('print-slip-mode');
        window.print();
        setTimeout(function() {
          document.body.classList.remove('print-slip-mode');
          printContainer.innerHTML = '';
        }, 1000);
      }

      // Cleans and formats breakdown notes for the printed Daily Ledger summary
      function formatNoteForSummary(noteStr) {
        if (!noteStr) return '';
        noteStr = noteStr.trim();
        if (noteStr.startsWith('[Breakdown:')) {
          const match = noteStr.match(/^\[Breakdown:\s*(.*?)\]\s*(.*)$/s);
          if (match) {
            const breakdownStr = match[1];
            const generalNote = match[2].trim();
            const parts = [];
            const items = breakdownStr.split(';').map(s => s.trim()).filter(Boolean);
            items.forEach(item => {
              let amount = 0;
              let note = '';
              const dashIdx = item.indexOf(' - ');
              if (dashIdx !== -1) {
                amount = parseFloat(item.substring(0, dashIdx).trim()) || 0;
                note = item.substring(dashIdx + 3).trim();
              } else {
                amount = parseFloat(item) || 0;
                note = item.replace(/^[0-9.]+\s*/, '').trim();
              }
              
              let cleanText = note;
              const directMatch = note.match(/^((?:\s*(?:\d+|coins)x\d+\s*)(?:,\s*(?:\d+|coins)x\d+\s*)*)(.*)$/i);
              if (directMatch) {
                cleanText = directMatch[2].trim();
              }
              
              const amtStr = 'Rs.' + amount.toLocaleString('en-IN', { minimumFractionDigits: 2 });
              if (cleanText) {
                parts.push(amtStr + ' (' + cleanText + ')');
              } else {
                parts.push(amtStr);
              }
            });
            let result = parts.join(' + ');
            if (generalNote) {
              result += ' — ' + generalNote;
            }
            return result;
          }
        }
        
        const directMatch = noteStr.match(/^((?:\s*(?:\d+|coins)x\d+\s*)(?:,\s*(?:\d+|coins)x\d+\s*)*)(.*)$/i);
        if (directMatch) {
          return directMatch[2].trim();
        }
        const bracketMatch = noteStr.match(/^\[(.*?)\](.*)$/);
        if (bracketMatch) {
          return bracketMatch[2].trim();
        }
        
        return noteStr;
      }

      // Fetch and print detailed ledger for selected date range
      function printDetailedRangeLedger() {
        const startDate = document.getElementById('report-start-date').value;
        const endDate = document.getElementById('report-end-date').value;
        
        if (!startDate || !endDate) {
          showToast('Please select both Start and End dates', 'error');
          return;
        }
        if (new Date(startDate) > new Date(endDate)) {
          showToast('Start Date cannot be after End Date', 'error');
          return;
        }
        
        showLoading(true, 'Generating print layout...');
        
        google.script.run
          .withSuccessHandler(function(ledgerList) {
            showLoading(false);
            if (ledgerList && ledgerList.length > 0) {
              let stackedHtml = '';
              ledgerList.forEach(day => {
                stackedHtml += buildDailyLedgerPrintHtml(day);
              });
              
              const printContainer = document.getElementById('detailed-ledger-print-container');
              printContainer.innerHTML = stackedHtml;
              
              document.body.classList.add('print-detailed-ledger-mode');
              window.print();
              setTimeout(function() {
                document.body.classList.remove('print-detailed-ledger-mode');
                printContainer.innerHTML = '';
              }, 1000);
            } else {
              showToast('No ledger entries found for selected date range.', 'error');
            }
          })
          .withFailureHandler(function(err) {
            showLoading(false);
            showToast('Print error: ' + err.message, 'error');
          })
          .getDetailedRangeLedger(startDate, endDate);
      }

        const r1Details = document.getElementById('r-details-1').value;
        if (r1Details.trim()) {
          details.push({ section: 'Receipt', sl: 1, details: r1Details, rate: 0, qty: 1, amount: r1Amt });
        }
        
        const rRows = document.getElementById('receipts-tbody').rows;
        for (let i = 1; i < rRows.length; i++) {
          const sl = i + 1;
          const dVal = document.getElementById('r-details-' + sl).value;
          const rVal = parseFloat(document.getElementById('r-rate-' + sl).value) || 0;
          const qVal = parseFloat(document.getElementById('r-qty-' + sl).value) || 0;
          const aVal = rVal * qVal;
          if (dVal.trim()) {
            details.push({ section: 'Receipt', sl: sl, details: dVal, rate: rVal, qty: qVal, amount: aVal });
          }
        }
        
        const eRows = document.getElementById('expenses-tbody').rows;
        for (let j = 0; j < eRows.length; j++) {
          const sl = j + 1;
          const dVal = document.getElementById('e-details-' + sl).value;
          const rVal = parseFloat(document.getElementById('e-rate-' + sl).value) || 0;
          const qVal = parseFloat(document.getElementById('e-qty-' + sl).value) || 0;
          const aVal = rVal * qVal;
          if (dVal.trim()) {
            details.push({ section: 'Expense', sl: sl, details: dVal, rate: rVal, qty: qVal, amount: aVal });
          }
        }

        const dayData = {
          summary: summary,
          details: details
        };

        const printContainer = document.getElementById('detailed-ledger-print-container');
        const format = document.getElementById('print-format-select').value;
        
        let printClass = 'print-detailed-ledger-mode';
        if (format === '80mm') {
          printContainer.innerHTML = buildDailyLedgerThermalPrintHtml(dayData, '80mm');
          printClass = 'print-thermal-80mm-mode';
        } else if (format === '58mm') {
          printContainer.innerHTML = buildDailyLedgerThermalPrintHtml(dayData, '58mm');
          printClass = 'print-thermal-58mm-mode';
        } else {
          printContainer.innerHTML = buildDailyLedgerPrintHtml(dayData);
          printClass = 'print-detailed-ledger-mode';
        }
        
        document.body.classList.add(printClass);
        window.print();
        setTimeout(function() {
          document.body.classList.remove('print-detailed-ledger-mode', 'print-thermal-80mm-mode', 'print-thermal-58mm-mode');
          printContainer.innerHTML = '';
        }, 1000);
      }

      window.handleExportBackup = function() {
        showLoading(true, 'Generating JSON backup...');
        google.script.run
          .withSuccessHandler(function(jsonString) {
            showLoading(false);
            try {
              var blob = new Blob([jsonString], { type: 'application/json' });
              var url = URL.createObjectURL(blob);
              var a = document.createElement('a');
              var dateStr = new Date().toISOString().split('T')[0];
              a.href = url;
              a.download = 'rojnamcha_backup_' + dateStr + '.json';
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
              showToast('Backup exported successfully!', 'success');
            } catch (err) {
              showToast('Failed to download backup file: ' + err.message, 'error');
            }
          })
          .withFailureHandler(function(err) {
            showLoading(false);
            showToast('Export failed: ' + err.message, 'error');
          })
          .exportAllDataJSON();
      };

      window.handleImportBackup = function(event) {
        var file = event.target.files[0];
        if (!file) return;
        
        var reader = new FileReader();
        reader.onload = function(e) {
          var content = e.target.result;
          
          try {
            var parsed = JSON.parse(content);
            if (!parsed || (!parsed.master && !parsed.data) || (!parsed.rojnamcha && !parsed.data)) {
              showToast('Invalid backup file structure.', 'error');
              event.target.value = '';
              return;
            }
          } catch(err) {
            showToast('File is not a valid JSON document.', 'error');
            event.target.value = '';
            return;
          }
          
           showCustomPrompt(
            "WARNING:\n\nKya aap sach me ye backup restore karna chahte hain?\n\nIsse aapka Firestore ka current data PURA DELETE ho jayega aur backup file ka data import ho jayega.\n\nRestoration confirm karne ke liye dialog box me 'RESTORE' likhein:",
            "",
            function(confirmRestore) {
              if (confirmRestore && confirmRestore.trim().toUpperCase() === 'RESTORE') {
                showLoading(true, 'Restoring database from backup...');
                google.script.run
                  .withSuccessHandler(function(res) {
                    showLoading(false);
                    event.target.value = '';
                    if (res && res.success) {
                      alert('Database restored successfully! The page will now reload.');
                      window.location.reload();
                    } else {
                      showToast('Restore failed: ' + (res.error || 'Unknown error'), 'error');
                    }
                  })
                  .withFailureHandler(function(err) {
                    showLoading(false);
                    event.target.value = '';
                    showToast('Import failed: ' + err.message, 'error');
                  })
                  .importAllDataJSON(content);
              } else {
                event.target.value = '';
                showToast('Restore cancelled or incorrect confirmation word.', 'info');
              }
            },
            {
              title: "Confirm Database Restore",
              label: "Confirmation Word",
              placeholder: "Type RESTORE to confirm...",
              okText: "Restore Now",
              cancelText: "Cancel"
            }
          );
        };
        reader.readAsText(file);
      };

      function renderDashboardChart(trend) {
        const container = document.getElementById('dash-chart-container');
        if (!container) return;
        if (!trend || trend.length === 0) {
          container.innerHTML = '<span style="color:var(--text-muted);">No trend data available.</span>';
          return;
        }
        
        // Find max value to scale the height
        const maxVal = Math.max(...trend.map(t => Math.max(t.receipts, t.expenses)), 1000);
        
        let svg = `
          <svg viewBox="0 0 500 220" width="100%" height="100%" style="overflow: visible;">
            <!-- Grid lines -->
            <line x1="40" y1="20" x2="480" y2="20" stroke="var(--border-color)" stroke-dasharray="3,3" opacity="0.3"/>
            <line x1="40" y1="70" x2="480" y2="70" stroke="var(--border-color)" stroke-dasharray="3,3" opacity="0.3"/>
            <line x1="40" y1="120" x2="480" y2="120" stroke="var(--border-color)" stroke-dasharray="3,3" opacity="0.3"/>
            <line x1="40" y1="170" x2="480" y2="170" stroke="var(--border-color)" stroke-dasharray="3,3" opacity="0.3"/>
            <line x1="40" y1="170" x2="480" y2="170" stroke="var(--text-muted)" stroke-width="1.5"/>
            
            <!-- Y-Axis Labels -->
            <text x="35" y="24" fill="var(--text-muted)" font-size="9" font-weight="600" text-anchor="end">₹${(maxVal).toFixed(0)}</text>
            <text x="35" y="74" fill="var(--text-muted)" font-size="9" font-weight="600" text-anchor="end">₹${(maxVal * 0.66).toFixed(0)}</text>
            <text x="35" y="124" fill="var(--text-muted)" font-size="9" font-weight="600" text-anchor="end">₹${(maxVal * 0.33).toFixed(0)}</text>
            <text x="35" y="174" fill="var(--text-muted)" font-size="9" font-weight="600" text-anchor="end">₹0</text>
        `;
        
        const colWidth = 60;
        const startX = 60;
        
        trend.forEach((day, index) => {
          const x = startX + index * colWidth;
          const rHeight = (day.receipts / maxVal) * 140;
          const eHeight = (day.expenses / maxVal) * 140;
          
          const rY = 170 - rHeight;
          const eY = 170 - eHeight;
          
          const dateObj = new Date(day.date);
          const dateLabel = dateObj.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
          
          svg += `
            <!-- Receipt bar (Green) -->
            <rect x="${x}" y="${rY}" width="16" height="${rHeight}" fill="var(--receipt-primary)" rx="2" style="transition: all 0.5s ease-out; cursor: pointer;">
              <title>Date: ${day.date}\nReceipts: ₹${day.receipts.toFixed(2)}</title>
            </rect>
            <!-- Expense bar (Red) -->
            <rect x="${x + 20}" y="${eY}" width="16" height="${eHeight}" fill="var(--expense-primary)" rx="2" style="transition: all 0.5s ease-out; cursor: pointer;">
              <title>Date: ${day.date}\nExpenses: ₹${day.expenses.toFixed(2)}</title>
            </rect>
            
            <!-- X-Axis Label -->
            <text x="${x + 18}" y="192" fill="var(--text-muted)" font-size="9" font-weight="600" text-anchor="middle">${dateLabel}</text>
          `;
        });
        
        svg += `</svg>`;
        container.innerHTML = svg;
      }

        const start = document.getElementById('search-start-date').value;

      function setupDailyReminder() {
        if ('Notification' in window) {
          if (Notification.permission === 'default') {
            Notification.requestPermission();
          }
        }
      }
      
      function triggerBrowserReminder(missingDays) {
        if (!missingDays || missingDays.length === 0) return;
        
        const todayStr = new Date().toISOString().split('T')[0];
        const isTodayMissing = missingDays.includes(todayStr);
        
        if (isTodayMissing && 'Notification' in window && Notification.permission === 'granted') {
          const lastNotified = localStorage.getItem('rojnamcha_last_notified');
          if (lastNotified !== todayStr) {
            new Notification("Rojnamcha Entry Pending", {
              body: "Today's daily cash ledger entry has not been recorded yet. Please click to fill now.",
              icon: (state.companyProfile && state.companyProfile.companyLogo) || ""
            }).onclick = function() {
              window.focus();
              goToDailyEntryToday();
            };
            localStorage.setItem('rojnamcha_last_notified', todayStr);
          }
        }
      }

      // ==========================================
      // THERMAL PRINTOUTS HTML BUILDER
      // ==========================================
      function buildDailyLedgerThermalPrintHtml(dayData, width) {
        const summary = dayData.summary;
        const details = dayData.details || [];
        const profile = state.companyProfile || {};
        const companyName = profile.companyName || 'Rojnamcha Ledger';
        const companyAddress = profile.companyAddress || '';
        const companyGSTIN = profile.companyGSTIN || '';
        
        const receiptTotal = parseFloat(summary.receiptTotal || 0);
        const expenseTotal = parseFloat(summary.expenseTotal || 0);
        const openingCash  = parseFloat(summary.openingCash || 0);
        const netBalance   = parseFloat(summary.netBalance != null ? summary.netBalance : (openingCash + receiptTotal - expenseTotal));
        const cashSendToHome     = parseFloat(summary.cashSendToHome || 0);
        const cashDepositToBank  = parseFloat(summary.cashDepositToBank || 0);
        const closingCashInHand  = parseFloat(summary.closingCashInHand || 0);

        const receipts = details.filter(d => d.section === 'Receipt');
        const expenses = details.filter(d => d.section === 'Expense');
        
        receipts.sort((a, b) => a.sl - b.sl);
        expenses.sort((a, b) => a.sl - b.sl);
        
        let html = `
          <div style="width: 100%; font-family: monospace; color: #000; padding: 2px; line-height: 1.3;">
            <div style="text-align: center; border-bottom: 1px dashed #000; padding-bottom: 6px; margin-bottom: 6px;">
              <h4 style="margin: 0; font-size: 13px; font-weight: bold; text-transform: uppercase;">${companyName}</h4>
              ${companyAddress ? `<p style="margin: 2px 0; font-size: 9px;">${companyAddress}</p>` : ''}
              ${companyGSTIN ? `<p style="margin: 2px 0; font-size: 9px; font-weight: bold;">GSTIN: ${companyGSTIN}</p>` : ''}
              <h5 style="margin: 6px 0 0 0; font-size: 11px; text-transform: uppercase; border-top: 1px dashed #000; padding-top: 4px;">DAILY CASH REGISTER</h5>
              <p style="margin: 2px 0 0 0; font-size: 10px; font-weight: bold;">Date: ${formatDateReadable(summary.date)}</p>
            </div>
            
            <!-- Receipts Section -->
            <div style="margin-bottom: 8px;">
              <div style="font-weight: bold; border-bottom: 1px dashed #000; font-size: 10px; padding-bottom: 1px; margin-bottom: 3px;">RECEIPTS (INFLOW)</div>
              <table style="width: 100%; font-size: 9px; border-collapse: collapse;">
        `;
        
        if (receipts.length === 0) {
          html += `<tr><td colspan="2" style="padding: 2px 0; color: #555;">No receipts.</td></tr>`;
        } else {
          receipts.forEach(item => {
            const multiplierStr = item.qty > 1 ? `(${item.qty}x₹${item.rate.toFixed(0)})` : '';
            html += `
              <tr>
                <td style="padding: 2px 0; vertical-align: top;">${item.sl}. ${item.details} ${multiplierStr}</td>
                <td style="padding: 2px 0; text-align: right; vertical-align: top; white-space: nowrap;">₹${item.amount.toFixed(2)}</td>
              </tr>
            `;
          });
        }
        
        html += `
                <tr style="border-top: 1px dashed #000; font-weight: bold;">
                  <td style="padding: 3px 0 1px 0;">Total Receipts</td>
                  <td style="padding: 3px 0 1px 0; text-align: right;">₹${receiptTotal.toFixed(2)}</td>
                </tr>
              </table>
            </div>
            
            <!-- Expenses Section -->
            <div style="margin-bottom: 8px;">
              <div style="font-weight: bold; border-bottom: 1px dashed #000; font-size: 10px; padding-bottom: 1px; margin-bottom: 3px;">EXPENSES (OUTFLOW)</div>
              <table style="width: 100%; font-size: 9px; border-collapse: collapse;">
        `;
        
        if (expenses.length === 0) {
          html += `<tr><td colspan="2" style="padding: 2px 0; color: #555;">No expenses.</td></tr>`;
        } else {
          expenses.forEach((item, idx) => {
            const multiplierStr = item.qty > 1 ? `(${item.qty}x₹${item.rate.toFixed(0)})` : '';
            html += `
              <tr>
                <td style="padding: 2px 0; vertical-align: top;">${idx + 1}. ${item.details} ${multiplierStr}</td>
                <td style="padding: 2px 0; text-align: right; vertical-align: top; white-space: nowrap;">₹${item.amount.toFixed(2)}</td>
              </tr>
            `;
          });
        }
        
        html += `
                <tr style="border-top: 1px dashed #000; font-weight: bold;">
                  <td style="padding: 3px 0 1px 0;">Total Expenses</td>
                  <td style="padding: 3px 0 1px 0; text-align: right;">₹${expenseTotal.toFixed(2)}</td>
                </tr>
              </table>
            </div>
            
            <!-- Summary totals -->
            <div style="border-top: 1px dashed #000; border-bottom: 1px dashed #000; padding: 4px 0; margin-bottom: 8px; font-size: 9px;">
              <table style="width: 100%; border-collapse: collapse;">
                <tr>
                  <td style="padding: 1px 0;">Opening Cash</td>
                  <td style="padding: 1px 0; text-align: right;">₹${openingCash.toFixed(2)}</td>
                </tr>
                <tr>
                  <td style="padding: 1px 0;">Net Cash Balance</td>
                  <td style="padding: 1px 0; text-align: right;">₹${netBalance.toFixed(2)}</td>
                </tr>
                <tr>
                  <td style="padding: 1px 0;">Sent To Home</td>
                  <td style="padding: 1px 0; text-align: right;">₹${cashSendToHome.toFixed(2)}</td>
                </tr>
                <tr>
                  <td style="padding: 1px 0;">Deposited to Bank</td>
                  <td style="padding: 1px 0; text-align: right;">₹${cashDepositToBank.toFixed(2)}</td>
                </tr>
                <tr style="font-weight: bold; font-size: 10px;">
                  <td style="padding: 3px 0 0 0;">Closing Cash In Hand</td>
                  <td style="padding: 3px 0 0 0; text-align: right;">₹${closingCashInHand.toFixed(2)}</td>
                </tr>
              </table>
            </div>
            
            <div style="text-align: center; font-size: 8px; color: #333; margin-top: 10px; border-top: 1px dashed #000; padding-top: 4px;">
              <p style="margin: 0;">Generated by: ${state.currentUser ? (state.currentUser.name || state.currentUser.username) : 'System'}</p>
              <p style="margin: 2px 0 0 0;">Rojnamcha Ledger Manager</p>
            </div>
          </div>
        `;
        return html;
      }

      function buildThermalSlipHtml(type, date, amount, note, slipIndex) {
        const profile = state.companyProfile || {};
        const companyName = profile.companyName || 'GAS AGENCY';
        const companyAddress = profile.companyAddress || '';
        const companyGSTIN = profile.companyGSTIN || '';
        const isHome = type === 'home';
        const slipTypeLabel = isHome ? 'CASH VOUCHER (SENT HOME)' : 'BANK DEPOSIT CHALLAN';
        const amountWords = convertNumberToWords(amount);
        const suffix = (slipIndex !== undefined && slipIndex !== null) ? ('-' + slipIndex) : '';
        const voucherNo = 'VCH/' + date.replace(/-/g, '') + '/' + (isHome ? 'H' : 'B') + suffix;
        const currentUserName = state.currentUser ? (state.currentUser.name || state.currentUser.username) : 'System';

        let cashIndexHtml = '';
        let displayNote = note || '';

        if (note && note.trim().startsWith('[Breakdown:')) {
          const parsedMultiple = parseMultipleTransfers(note);
          const slips = [];
          parsedMultiple.entries.forEach((entry, idx) => {
            let subSlipIndex = (idx + 1);
            if (slipIndex !== undefined && slipIndex !== null) {
              subSlipIndex = slipIndex + '-' + (idx + 1);
            }
            slips.push(buildThermalSlipHtml(type, date, entry.amount, entry.note, subSlipIndex));
          });
          const divider = `<div class="slip-separator" style="margin: 1.5rem 0; border-top: 1px dashed #000;"></div>`;
          return slips.join(divider);
        } else {
          const parsedCash = parseDenominationsFromNote(note);
          if (parsedCash) {
            displayNote = parsedCash.cleanNote;
            cashIndexHtml = `
              <div style="margin-top: 6px; margin-bottom: 6px;">
                <div style="font-size: 9px; font-weight: bold; border-bottom: 1px dashed #000; padding-bottom: 2px; margin-bottom: 4px; text-transform: uppercase;">
                  CASH INDEX / DENOMINATIONS
                </div>
                <table style="width: 100%; font-size: 8px; border-collapse: collapse;">
                  ${parsedCash.breakdown.map(item => `
                    <tr>
                      <td style="padding: 1px 0;">${item.label} (${item.count} pcs)</td>
                      <td style="padding: 1px 0; text-align: right;">₹${item.total.toFixed(2)}</td>
                    </tr>
                  `).join('')}
                  <tr style="border-top: 1px dashed #000; font-weight: bold;">
                    <td style="padding: 3px 0 1px 0;">TOTAL COUNT</td>
                    <td style="padding: 3px 0 1px 0; text-align: right;">₹${parsedCash.total.toFixed(2)}</td>
                  </tr>
                </table>
              </div>
            `;
          }
          
          return `
            <div style="width: 100%; font-family: monospace; color: #000; padding: 2px; line-height: 1.3;">
              <div style="text-align: center; border-bottom: 1px dashed #000; padding-bottom: 4px; margin-bottom: 6px;">
                <h4 style="margin: 0; font-size: 13px; font-weight: bold; text-transform: uppercase;">${companyName}</h4>
                ${companyAddress ? `<p style="margin: 2px 0; font-size: 9px;">${companyAddress}</p>` : ''}
                ${companyGSTIN ? `<p style="margin: 2px 0; font-size: 9px; font-weight: bold;">GSTIN: ${companyGSTIN}</p>` : ''}
                <h5 style="margin: 4px 0 0 0; font-size: 10px; text-transform: uppercase; border-top: 1px dashed #000; padding-top: 4px;">${slipTypeLabel}</h5>
              </div>
              
              <table style="width: 100%; font-size: 9px; border-collapse: collapse; margin-bottom: 6px;">
                <tr><td style="padding: 2px 0;">Voucher No.</td><td style="padding: 2px 0; text-align: right; font-weight: bold;">${voucherNo}</td></tr>
                <tr><td style="padding: 2px 0;">Date</td><td style="padding: 2px 0; text-align: right; font-weight: bold;">${formatDateReadable(date)}</td></tr>
                <tr style="font-size: 10px; font-weight: bold;"><td style="padding: 3px 0; border-top: 1px dashed #000; border-bottom: 1px dashed #000;">AMOUNT</td><td style="padding: 3px 0; text-align: right; border-top: 1px dashed #000; border-bottom: 1px dashed #000;">₹${parseFloat(amount).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</td></tr>
                <tr><td colspan="2" style="padding: 2px 0; font-style: italic; font-size: 8px; text-transform: capitalize;">Words: ${amountWords} Rupees Only</td></tr>
                ${displayNote ? `<tr><td style="padding: 2px 0;">Note/Ref.</td><td style="padding: 2px 0; text-align: right;">${displayNote}</td></tr>` : ''}
                <tr><td style="padding: 2px 0;">Gen. By</td><td style="padding: 2px 0; text-align: right;">${currentUserName}</td></tr>
              </table>
              
              ${cashIndexHtml}
              
              <div style="border-top: 1px dashed #000; margin-top: 8px; padding-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; text-align: center; font-size: 8px;">
                <div>
                  <div style="font-weight: bold; margin-top: 8px;">${currentUserName}</div>
                  <div style="border-top: 0.5px solid #000; margin-top: 2px; padding-top: 1px;">Prepared By</div>
                </div>
                <div>
                  <div style="margin-top: 16px;"></div>
                  <div style="border-top: 0.5px solid #000; margin-top: 2px; padding-top: 1px;">Authorized Sign</div>
                </div>
              </div>
            </div>
          `;
        }
      }

      let analyticsData = {};

      function loadItemAnalytics() {
        const start = document.getElementById('analytics-start-date').value;
        const end = document.getElementById('analytics-end-date').value;
        
        if (!start || !end) {
          showToast('Please select start and end dates', 'error');
          return;
        }
        
        showLoading(true, 'Generating Item-wise Analytics...');
        
        google.script.run
          .withSuccessHandler(function(entries) {
            showLoading(false);
            
            const groups = {};
            
            entries.forEach(function(entry) {
              const name = (entry.details || '').trim();
              if (!name) return;
              
              const key = entry.section + '|||' + name.toUpperCase();
              if (!groups[key]) {
                groups[key] = {
                  name: name,
                  type: entry.section,
                  totalQty: 0,
                  totalAmount: 0,
                  records: []
                };
              }
              
              groups[key].totalQty += entry.qty || 0;
              groups[key].totalAmount += entry.amount || 0;
              groups[key].records.push(entry);
            });
            
            analyticsData = groups;
            
            const tbody = document.getElementById('analytics-summary-tbody');
            tbody.innerHTML = '';
            
            const groupList = Object.values(groups);
            groupList.sort((a, b) => b.totalAmount - a.totalAmount);
            
            if (groupList.length === 0) {
              tbody.innerHTML = '<tr><td colspan="6" style="padding: 2rem; text-align: center; color: var(--text-muted);">No product/item transactions found in this date range.</td></tr>';
              document.getElementById('analytics-summary-section').style.display = 'block';
              document.getElementById('analytics-details-section').style.display = 'none';
              return;
            }
            
            groupList.forEach(function(g) {
              const avgRate = g.totalQty > 0 ? (g.totalAmount / g.totalQty) : 0;
              const typeColor = g.type === 'Receipt' ? 'var(--receipt-primary)' : 'var(--expense-primary)';
              const typeLabel = g.type === 'Receipt' ? 'Sale (Inflow)' : 'Expense (Outflow)';
              
              const safeKey = g.type + '|||' + g.name.toUpperCase();
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td style="font-weight: 700; color: var(--text-dark);">${g.name}</td>
                <td style="text-align: center;"><span style="color: ${typeColor}; font-weight: 700; font-size: 0.8rem; background: ${g.type === 'Receipt' ? 'var(--receipt-bg)' : 'var(--expense-bg)'}; padding: 0.2rem 0.5rem; border-radius: 0.25rem;">${typeLabel}</span></td>
                <td style="text-align: center; font-weight: 600;">${g.totalQty.toLocaleString('en-IN')}</td>
                <td style="text-align: right; font-family: monospace; font-weight: 600;">₹${avgRate.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                <td style="text-align: right; font-family: monospace; font-weight: 700; color: ${typeColor};">₹${g.totalAmount.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                <td style="text-align: center;">
                  <button type="button" class="btn-delete-option" style="color: var(--primary-color); border: 1px solid var(--primary-color); padding: 0.25rem 0.6rem; border-radius: 0.25rem; font-size: 0.75rem;" onclick="viewItemAnalyticsDetails('${safeKey.replace(/'/g, "\\'")}')">
                    View Details
                  </button>
                </td>
              `;
              tbody.appendChild(tr);
            });
            
            document.getElementById('analytics-summary-section').style.display = 'block';
            document.getElementById('analytics-details-section').style.display = 'none';
          })
          .withFailureHandler(function(err) {
            showLoading(false);
            showToast('Failed to load item analytics: ' + err.toString(), 'error');
          })
          .searchEntries('', start, end);
      }

      function viewItemAnalyticsDetails(key) {
        const group = analyticsData[key];
        if (!group) return;
        
        document.getElementById('analytics-details-title').innerText = `Item Details Breakdown: ${group.name} (${group.type === 'Receipt' ? 'Sales' : 'Expenses'})`;
        
        const tbody = document.getElementById('analytics-details-tbody');
        tbody.innerHTML = '';
        
        group.records.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        group.records.forEach(function(rec) {
          const tr = document.createElement('tr');
          const amtColor = group.type === 'Receipt' ? 'var(--receipt-primary)' : 'var(--expense-primary)';
          tr.innerHTML = `
            <td style="font-weight: 600; color: var(--text-muted);">${formatDateReadable(rec.date)}</td>
            <td style="text-align: right; font-family: monospace;">₹${(rec.rate || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</td>
            <td style="text-align: center; font-weight: 600;">${(rec.qty || 0).toLocaleString('en-IN')}</td>
            <td style="text-align: right; font-family: monospace; font-weight: 700; color: ${amtColor};">₹${(rec.amount || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</td>
            <td style="font-size: 0.8rem; color: var(--text-dark);">${rec.note || '-'}</td>
            <td style="text-align: center;">
              <button type="button" class="btn-delete-option" style="color: var(--accent-gold-text); border: 1px solid var(--accent-gold); padding: 0.25rem 0.6rem; border-radius: 0.25rem; font-size: 0.75rem;" onclick="jumpToLedgerDate('${rec.date}')">
                Edit Date
              </button>
            </td>
          `;
          tbody.appendChild(tr);
        });
        
        const detailsCard = document.getElementById('analytics-details-section');
        detailsCard.style.display = 'block';
        detailsCard.scrollIntoView({ behavior: 'smooth' });
      }

      function jumpToLedgerDate(dateStr) {
        state.selectedDate = dateStr;
        document.getElementById('ledger-date').value = dateStr;
        
        // Find tab-daily button and click it to switch view
        const tabDaily = document.getElementById('tab-daily');
        if (tabDaily) tabDaily.click();
        loadDailyLedger(dateStr);
      }

      function handleResetApp() {
        if (confirm("Kya aap app settings reset karna chahte hain? Isse aapka login session aur database connection connection settings default par reset ho jayengi.")) {
          localStorage.clear();
          showToast('Settings reset successfully! Reloading page...', 'success');
          setTimeout(function() {
            window.location.reload(true);
          }, 1500);
        }
      }
    </script>
