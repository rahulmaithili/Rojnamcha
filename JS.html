// Pure JS SHA-256 implementation as fallback for insecure contexts (like file:/// previews)
function sha256_pureJS(ascii) {
  const K = [
    0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
    0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
    0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
    0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
    0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
    0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
    0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
    0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
  ];

  let H = [
    0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a, 0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
  ];

  let words = [];
  let asciiLength = ascii.length * 8;
  
  ascii += '\x80';
  while (ascii.length % 64 !== 56) {
    ascii += '\x00';
  }
  
  for (let i = 0; i < ascii.length; i++) {
    words[i >> 2] |= ascii.charCodeAt(i) << (24 - 8 * (i & 3));
  }
  
  words.push(0);
  words.push(asciiLength);

  function rightRotate(value, amount) {
    return (value >>> amount) | (value << (32 - amount));
  }

  for (let j = 0; j < words.length; j += 16) {
    let W = new Array(64);
    for (let i = 0; i < 16; i++) {
      W[i] = words[j + i] | 0;
    }
    for (let i = 16; i < 64; i++) {
      let s0 = rightRotate(W[i - 15], 7) ^ rightRotate(W[i - 15], 18) ^ (W[i - 15] >>> 3);
      let s1 = rightRotate(W[i - 2], 17) ^ rightRotate(W[i - 2], 19) ^ (W[i - 2] >>> 10);
      W[i] = (W[i - 16] + s0 + W[i - 7] + s1) | 0;
    }

    let a = H[0], b = H[1], c = H[2], d = H[3], e = H[4], f = H[5], g = H[6], h = H[7];

    for (let i = 0; i < 64; i++) {
      let S1 = rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25);
      let ch = (e & f) ^ ((~e) & g);
      let temp1 = (h + S1 + ch + K[i] + W[i]) | 0;
      let S0 = rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22);
      let maj = (a & b) ^ (a & c) ^ (b & c);
      let temp2 = (S0 + maj) | 0;

      h = g;
      g = f;
      f = e;
      e = (d + temp1) | 0;
      d = c;
      c = b;
      b = a;
      a = (temp1 + temp2) | 0;
    }

    H[0] = (H[0] + a) | 0;
    H[1] = (H[1] + b) | 0;
    H[2] = (H[2] + c) | 0;
    H[3] = (H[3] + d) | 0;
    H[4] = (H[4] + e) | 0;
    H[5] = (H[5] + f) | 0;
    H[6] = (H[6] + g) | 0;
    H[7] = (H[7] + h) | 0;
  }

  let result = '';
  for (let i = 0; i < 8; i++) {
    let hex = (H[i] >>> 0).toString(16);
    while (hex.length < 8) {
      hex = '0' + hex;
    }
    result += hex;
  }
  return result;
}

// Client-side SHA-256 password hashing (matches Apps Script behavior)
async function clientHashPassword(password) {
  if (window.crypto && window.crypto.subtle) {
    try {
      const msgUint8 = new TextEncoder().encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      return hashHex;
    } catch(e) {
      console.warn("Subtle crypto failed, falling back to pure JS hash: ", e);
    }
  }
  return sha256_pureJS(password);
}

// 1. GOOGLE SHEETS API INTERCEPTOR
function callBackendApi(action, args, successHandler, failureHandler) {
  const apiUrl = localStorage.getItem('rojnamcha_api_url') || 'https://script.google.com/macros/s/AKfycbx8h0orszwV29cKrVCUbrR-59HzsF1_aCFfuSBRVpQp3VnzI0carkCRWt5M_eb-Ra-DBA/exec';
  if (!apiUrl) {
    if (failureHandler) {
      failureHandler(new Error('API URL is not configured.'));
    }
    showApiConfigScreen();
    return;
  }

  fetch(apiUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain'
    },
    body: JSON.stringify({ action: action, args: args })
  })
  .then(response => {
    if (!response.ok) {
      throw new Error('HTTP network error: ' + response.statusText);
    }
    return response.json();
  })
  .then(res => {
    if (res && res.success === false) {
      if (failureHandler) {
        failureHandler(new Error(res.error || 'API execution error'));
      } else {
        showToast(res.error || 'Server error occurred', 'error');
      }
    } else {
      if (successHandler) {
        successHandler(res);
      }
    }
  })
  .catch(err => {
    console.error('API call failed:', err);
    if (failureHandler) {
      failureHandler(err);
    } else {
      showToast('API call failed: ' + err.message, 'error');
    }
  });
}

function createRunContext() {
  let successHandler = null;
  let failureHandler = null;
  const context = {};
  const proxy = new Proxy(context, {
    get(target, prop) {
      if (prop === 'withSuccessHandler') {
        return function(h) {
          successHandler = h;
          return proxy;
        };
      }
      if (prop === 'withFailureHandler') {
        return function(h) {
          failureHandler = h;
          return proxy;
        };
      }
      return function(...args) {
        callBackendApi(prop, args, successHandler, failureHandler);
      };
    }
  });
  return proxy;
}

// 2. FIREBASE FIRESTORE API INTERCEPTOR
function callFirebaseApi(action, args, successHandler, failureHandler) {
  const fnName = "firebase_" + action;
  if (typeof window[fnName] === 'function') {
    window[fnName](args, successHandler, failureHandler);
  } else {
    console.error("Firebase API action not implemented:", action);
    if (failureHandler) failureHandler(new Error("Not implemented in Firebase mode: " + action));
  }
}

function createFirebaseRunContext() {
  let successHandler = null;
  let failureHandler = null;
  const context = {};
  const proxy = new Proxy(context, {
    get(target, prop) {
      if (prop === 'withSuccessHandler') {
        return function(h) {
          successHandler = h;
          return proxy;
        };
      }
      if (prop === 'withFailureHandler') {
        return function(h) {
          failureHandler = h;
          return proxy;
        };
      }
      return function(...args) {
        callFirebaseApi(prop, args, successHandler, failureHandler);
      };
    }
  });
  return proxy;
}

function initDatabaseConnection(forceReinit = false) {
  if (db && !forceReinit) {
    return true;
  }
  dbMode = 'firebase';
  let configStr = localStorage.getItem('rojnamcha_firebase_config');
  let config;
  if (!configStr) {
    config = defaultFirebaseConfig;
    localStorage.setItem('rojnamcha_firebase_config', JSON.stringify(defaultFirebaseConfig, null, 2));
  } else {
    try {
      config = JSON.parse(configStr);
    } catch(e) {
      config = defaultFirebaseConfig;
    }
  }
  try {
    if (firebase.apps.length === 0) {
      firebaseApp = firebase.initializeApp(config);
    } else {
      // Re-initialize with new config by deleting existing app
      try {
        const existingApp = firebase.app();
        if (existingApp) {
          existingApp.delete();
        }
      } catch(e) {}
      firebaseApp = firebase.initializeApp(config);
    }
    db = firebase.firestore();
    
    return true;
  } catch(err) {
    console.error("Firebase connection initialization failed:", err);
    showToast("Firebase Config error: " + err.message, "error");
    showApiConfigScreen();
    return false;
  }
}

window.handleApiConfigSubmit = function() {
  const configInput = document.getElementById('setup-firebase-config');
  let configStr = configInput.value.trim();
  if (!configStr) {
    showToast('Please enter your Firebase Configuration JSON', 'error');
    return;
  }
  
  // Clean JavaScript syntax to valid JSON format automatically
  let cleanStr = configStr;
  const firstBrace = cleanStr.indexOf('{');
  const lastBrace = cleanStr.lastIndexOf('}');
  if (firstBrace > -1 && lastBrace > -1) {
    cleanStr = cleanStr.substring(firstBrace, lastBrace + 1);
  }
  
  // Remove single-line comments
  cleanStr = cleanStr.replace(/\/\/.*/g, '');
  // Quote unquoted keys (e.g. apiKey: -> "apiKey":)
  cleanStr = cleanStr.replace(/([{,]\s*)([a-zA-Z0-9_]+)\s*:/g, '$1"$2":');
  // Swap single quotes to double quotes
  cleanStr = cleanStr.replace(/'/g, '"');
  // Remove trailing commas before closing brackets
  cleanStr = cleanStr.replace(/,\s*}/g, '}');
  cleanStr = cleanStr.replace(/,\s*]/g, ']');

  try {
    const parsed = JSON.parse(cleanStr);
    if (!parsed.apiKey || !parsed.projectId) {
      throw new Error('Config missing apiKey or projectId');
    }
    
    localStorage.setItem('rojnamcha_db_mode', 'firebase');
    localStorage.setItem('rojnamcha_firebase_config', JSON.stringify(parsed, null, 2));
    showToast('Firebase configuration saved!', 'success');
    document.getElementById('api-config-screen-overlay').style.display = 'none';
    
    const initialized = initDatabaseConnection(true);
    if (initialized) {
      setupGoogleScriptRunProxy();
      
      const today = new Date().toISOString().split('T')[0];
      showLoading(true, 'Connecting to Firestore...');
      google.script.run
        .withSuccessHandler(function(initData) {
          showLoading(false);
          handleInitData(initData);
          showAuthScreen('login');
        })
        .withFailureHandler(function(err) {
          showLoading(false);
          showToast('Firestore fetch failed: ' + err.message, 'error');
        })
        .getInitialData(today);
    }
  } catch(err) {
    showToast('Invalid Firebase configuration format: ' + err.message, 'error');
  }
};

window.firebase_loginUser = async function(args, successHandler, failureHandler) {
  try {
    const username = args[0].trim();
    const password = args[1];
    const normalizedUsername = username.toLowerCase();
    const inputHash = await clientHashPassword(password);
    
    const userDoc = await db.collection('users').doc(normalizedUsername).get();
    if (userDoc.exists) {
      const userData = userDoc.data();
      if (userData.passwordHash === inputHash) {
        if (userData.status === 'Approved') {
          successHandler({
            success: true,
            user: {
              username: userData.username,
              name: userData.name,
              email: userData.email,
              role: userData.role,
              status: userData.status,
              passwordHash: inputHash
            }
          });
        } else if (userData.status === 'Pending') {
          successHandler({ success: false, message: 'Your account is pending admin approval.' });
        } else {
          successHandler({ success: false, message: 'Your account access has been restricted/rejected.' });
        }
      } else {
        successHandler({ success: false, message: 'Invalid password. Please try again.' });
      }
    } else {
      // Auto seed admin user on fresh database setup
      const allUsersQuery = await db.collection('users').limit(1).get();
      if (allUsersQuery.empty && normalizedUsername === 'admin' && password === 'admin') {
        const defaultAdmin = {
          username: 'admin',
          passwordHash: inputHash,
          name: 'Administrator',
          email: 'admin@agency.com',
          role: 'Admin',
          status: 'Approved',
          resetRequest: false,
          createdAt: new Date().toISOString()
        };
        await db.collection('users').doc('admin').set(defaultAdmin);
        successHandler({
          success: true,
          user: {
            username: 'admin',
            name: 'Administrator',
            email: 'admin@agency.com',
            role: 'Admin',
            status: 'Approved',
            passwordHash: inputHash
          }
        });
      } else {
        successHandler({ success: false, message: 'Username not found.' });
      }
    }
  } catch (err) {
    if (failureHandler) failureHandler(err);
  }
};

window.firebase_registerUser = async function(args, successHandler, failureHandler) {
  try {
    const username = args[0].trim();
    const password = args[1];
    const name = args[2];
    const email = args[3];
    const normalizedUsername = username.toLowerCase();
    
    const userDoc = await db.collection('users').doc(normalizedUsername).get();
    if (userDoc.exists) {
      successHandler({ success: false, message: 'Username is already taken.' });
    } else {
      const passwordHash = await clientHashPassword(password);
      await db.collection('users').doc(normalizedUsername).set({
        username: normalizedUsername,
        passwordHash: passwordHash,
        name: name,
        email: email,
        role: 'User',
        status: 'Pending',
        resetRequest: false,
        createdAt: new Date().toISOString()
      });
      successHandler({ success: true, message: 'Registration submitted. Please contact Admin for approval.' });
    }
  } catch (err) {
    if (failureHandler) failureHandler(err);
  }
};

        db.collection('rojnamcha').get()

    } else {
      profile = {
        companyName: 'SHIV SHAKTI HP GAS AGENCY',
        companyAddress: 'PANDAUL BAZAR, MADHUBANI-847234',
        companyGSTIN: '10AEYPK3674C2ZH',
        companyLogo: ''
      };

        profile = Object.assign(profile, profileDoc.data());
      } else {
        db.collection('company_profile').doc('profile').set(profile);

          { section: 'Receipt', details: 'NAME TRANSFER PUMY', defaultRate: 143.00 },

          { section: 'Receipt', details: '19 KG SALE', defaultRate: 3500.00 },

window.firebase_getRojnamchaData = async function(args, successHandler, failureHandler) {
  try {
    const dateStr = args[0];
    
    const summaryDoc = await db.collection('rojnamcha').doc(dateStr).get();
    const detailsSnap = await db.collection('rojnamcha_details').where('date', '==', dateStr).get();
    
    if (summaryDoc.exists || !detailsSnap.empty) {
      const summary = summaryDoc.exists ? summaryDoc.data() : {
        date: dateStr,
        receiptTotal: 0,
        expenseTotal: 0,
        netBalance: 0,
        cashSendToHome: 0,
        cashDepositToBank: 0,
        closingCashInHand: 0,
        cashSendToHomeNote: '',
        cashDepositToBankNote: ''
      };
      const details = [];
      detailsSnap.forEach(doc => {
        details.push(doc.data());
      });
      details.sort((a, b) => a.sl - b.sl);
      successHandler({ summary, details });
    } else {
      // Single fast query: get the most recent entry before this date
      let previousClosingCash = 0;
      try {
        const prevSnap = await db.collection('rojnamcha')
          .where('date', '<', dateStr)
          .orderBy('date', 'desc')
          .limit(1)
          .get();
        if (!prevSnap.empty) {
          previousClosingCash = prevSnap.docs[0].data().closingCashInHand || 0;
        }
      } catch(e) { /* orderBy index may not exist yet, fallback */ }
      successHandler({ isNew: true, previousClosingCash });

window.firebase_saveRojnamcha = async function(args, successHandler, failureHandler) {
  try {
    const dateStr = args[0];
    const summary = args[1];
    const details = args[2];
    
    // Save Summary
    const summaryData = {
      date: dateStr,
      receiptTotal: summary.receiptTotal,
      expenseTotal: summary.expenseTotal,
      netBalance: summary.netBalance,
      cashSendToHome: summary.cashSendToHome,
      cashDepositToBank: summary.cashDepositToBank,
      closingCashInHand: summary.closingCashInHand,
      cashSendToHomeNote: summary.cashSendToHomeNote || '',
      cashDepositToBankNote: summary.cashDepositToBankNote || '',
      timestamp: new Date().toISOString()
    };
    await db.collection('rojnamcha').doc(dateStr).set(summaryData);
    
    // Clear old details
    const detailsSnap = await db.collection('rojnamcha_details').where('date', '==', dateStr).get();
    const batch = db.batch();
    detailsSnap.forEach(doc => {
      batch.delete(doc.ref);
    });
    await batch.commit();
    
    // Write new details
    const addBatch = db.batch();
    let count = 0;
    for (let item of details) {
      if (item.details && item.details.trim() !== '') {
        const id = dateStr + '_' + item.section + '_' + item.sl;
        const ref = db.collection('rojnamcha_details').doc(id);
        addBatch.set(ref, {
          date: dateStr,
          section: item.section,
          sl: item.sl,
          details: item.details.trim(),
          rate: item.rate,
          qty: item.qty,
          amount: item.amount
        });
        count++;
      }
    }
    if (count > 0) {
      await addBatch.commit();
    }
    successHandler({ success: true });
  } catch (err) {
    if (failureHandler) failureHandler(err);
  }
};

window.firebase_getPreviousClosingCash = async function(args, successHandler, failureHandler) {
  try {
    const dateStr = args[0];
    let prevClosing = 0;
    try {
      // Single ordered query - O(1) speed regardless of database size
      const prevSnap = await db.collection('rojnamcha')
        .where('date', '<', dateStr)
        .orderBy('date', 'desc')
        .limit(1)
        .get();
      if (!prevSnap.empty) {
        prevClosing = prevSnap.docs[0].data().closingCashInHand || 0;
      }
    } catch(e) {
      // Fallback if composite index not ready: full scan (old path)
      const snap = await db.collection('rojnamcha').get();
      const targetDate = new Date(dateStr);
      snap.forEach(doc => {
        const d = new Date(doc.id);
        if (d < targetDate) {
          const val = doc.data().closingCashInHand || 0;
          if (!prevClosing || d > new Date(prevClosing._date || 0)) {
            prevClosing = val;
          }
        }
      });
    }
    successHandler(prevClosing);
  } catch (err) {
    if (failureHandler) failureHandler(err);
  }
};

window.firebase_getRangeReport = async function(args, successHandler, failureHandler) {
  try {
    const start = args[0];
    const end = args[1];
    
    const summariesSnap = await db.collection('rojnamcha').where('date', '>=', start).where('date', '<=', end).get();
    const records = [];
    const summariesMap = {};
    
    summariesSnap.forEach(doc => {
      const s = doc.data();
      summariesMap[s.date] = s;
    });
    
    const detailsSnap = await db.collection('rojnamcha_details')
      .where('date', '>=', start)
      .where('date', '<=', end)
      .get();
      
    const openingCashMap = {};
    detailsSnap.forEach(doc => {
      const d = doc.data();
      if (d.section === 'Receipt' && d.sl === 1) {
        openingCashMap[d.date] = d.amount || 0;
      }
    });
    
    for (let dStr in summariesMap) {
      const s = summariesMap[dStr];
      const opCash = openingCashMap[dStr] || 0;
      const dynamicReceipts = Math.max(0, (s.receiptTotal || 0) - opCash);
      
      records.push({
        date: dStr,
        openingCash: opCash,
        receipts: dynamicReceipts,
        expenses: s.expenseTotal || 0,
        cashSendToHome: s.cashSendToHome || 0,
        cashSendToHomeNote: s.cashSendToHomeNote || '',
        cashDepositToBank: s.cashDepositToBank || 0,
        cashDepositToBankNote: s.cashDepositToBankNote || '',
        closingCashInHand: s.closingCashInHand || 0
      });
    }
    
    records.sort((a, b) => new Date(a.date) - new Date(b.date));
    successHandler(records);
  } catch (err) {
    if (failureHandler) failureHandler(err);
  }
};

window.firebase_getDetailedRangeLedger = async function(args, successHandler, failureHandler) {
  try {
    const start = args[0];
    const end = args[1];
    
    const summariesSnap = await db.collection('rojnamcha')
      .where('date', '>=', start)
      .where('date', '<=', end)
      .get();
      
    const summaries = [];
    summariesSnap.forEach(doc => {
      summaries.push(doc.data());
    });
    
    const detailsSnap = await db.collection('rojnamcha_details')
      .where('date', '>=', start)
      .where('date', '<=', end)
      .get();
      
    const detailsByDate = {};
    detailsSnap.forEach(doc => {
      const d = doc.data();
      if (!detailsByDate[d.date]) {
        detailsByDate[d.date] = [];
      }
      detailsByDate[d.date].push(d);
    });
    
    const result = [];
    for (let s of summaries) {
      const dayDetails = detailsByDate[s.date] || [];
      dayDetails.sort((a, b) => {
        if (a.section !== b.section) {
          return a.section === 'Receipt' ? -1 : 1;
        }
        return (a.sl || 0) - (b.sl || 0);
      });
      
      result.push({
        summary: s,
        details: dayDetails
      });
    }
    
    result.sort((a, b) => new Date(a.summary.date) - new Date(b.summary.date));
    successHandler(result);
  } catch (err) {
    if (failureHandler) failureHandler(err);
  }
};

window.firebase_getBankAccounts = async function(args, successHandler, failureHandler) {
  try {
    // Return from cache if available
    if (_fsCache.bankAccounts) {
      return successHandler(_fsCache.bankAccounts);
    }
    
    const snap = await db.collection('bank_accounts').get();
    const accounts = [];
    const needSyncIds = [];
    
    snap.forEach(doc => {
      const data = doc.data();
      accounts.push({ id: doc.id, ...data });
      if (data.balance === undefined || data.balance === null) {
        needSyncIds.push(doc.id);
      }
    });
    
    // Auto-create Default Bank if none exists
    if (accounts.length === 0) {
      const defaultAcc = { 
        name: 'Default Bank', 
        accountNumber: 'XXXXXXXX1234', 
        ifsc: 'DEFAULT0001', 
        branch: 'Main Branch', 
        logo: '',
        balance: 0,
        createdAt: new Date().toISOString() 
      };
      await db.collection('bank_accounts').doc('default-bank').set(defaultAcc);
      accounts.push({ id: 'default-bank', ...defaultAcc });
      needSyncIds.push('default-bank');
    }
    
    if (needSyncIds.length > 0) {
      await syncBankAccountBalances(needSyncIds);
      _fsCache.bankAccounts = null; // force fresh fetch after sync
      return window.firebase_getBankAccounts(args, successHandler, failureHandler);
    }
    
    _fsCache.bankAccounts = accounts;
    successHandler(accounts);
  } catch (err) {
    if (failureHandler) failureHandler(err);
  }
};

async function syncBankAccountBalances(bankAccountIds) {
  const uniqueIds = [...new Set(bankAccountIds.filter(Boolean))];
  for (const id of uniqueIds) {
    const snap = await db.collection('bank_deposits').where('bankAccountId', '==', id).get();
    let total = 0;
    snap.forEach(doc => {
      total += parseFloat(doc.data().amount) || 0;
    });
    await db.collection('bank_accounts').doc(id).update({
      balance: total
    });
  }
  _fsCache.bankAccounts = null; // invalidate cache after balance sync
}

async function syncDailyCashDepositSummary(dateStr) {
  // Query all deposits for this date
  const depositsSnap = await db.collection('bank_deposits').where('date', '==', dateStr).get();
  let totalAmount = 0;
  const notes = [];
  
  depositsSnap.forEach(doc => {
    const dep = doc.data();
    totalAmount += parseFloat(dep.amount) || 0;
    
    // Create a compact note: "HDFC (₹5000: note)"
    const noteText = dep.note ? `: ${dep.note}` : '';
    notes.push(`${dep.bankAccountName} (₹${dep.amount}${noteText})`);
  });
  
  const finalNote = notes.join(' | ');
  
  // Update the summary document
  const docRef = db.collection('rojnamcha').doc(dateStr);
  const doc = await docRef.get();
  
  if (doc.exists) {
    await docRef.update({
      cashDepositToBank: totalAmount,
      cashDepositToBankNote: finalNote
    });
  } else {
    await docRef.set({
      date: dateStr,
      receiptTotal: 0,
      expenseTotal: 0,
      netBalance: 0,
      cashSendToHome: 0,
      cashDepositToBank: totalAmount,
      closingCashInHand: 0,
      previousClosingCash: 0,
      cashSendToHomeNote: '',
      cashDepositToBankNote: finalNote
    });
  }
}

    let totalAllTime = 0;
    
    accountsSnap.forEach(doc => {
      const data = doc.data();

    });

        id: 'default-bank', 
        name: 'Default Bank', 
        accountNumber: 'XXXXXXXX1234',

window.firebase_getDashboardData = async function(args, successHandler, failureHandler) {
  try {
    const todayStr = args[0];
    
    // Get today's summary
    const todayDoc = await db.collection('rojnamcha').doc(todayStr).get();
    const todayData = todayDoc.exists ? todayDoc.data() : null;
    
    // Calculate last 7 dates
    const datesList = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(todayStr);
      d.setDate(d.getDate() - i);
      datesList.push(d.toISOString().split('T')[0]);
    }
    
    const startRange = datesList[0];
    const endRange = datesList[6];
    
    // Query summaries in range
    const rangeSnap = await db.collection('rojnamcha')
      .where('date', '>=', startRange)
      .where('date', '<=', endRange)
      .get();
      
    const rangeMap = {};
    rangeSnap.forEach(doc => {
      rangeMap[doc.id] = doc.data();
    });
    
    const trend = datesList.map(dStr => {
      const day = rangeMap[dStr] || {};
      return {
        date: dStr,
        receipts: parseFloat(day.receiptTotal || day.receipts || 0),
        expenses: parseFloat(day.expenseTotal || day.expenses || 0),
        exists: !!rangeMap[dStr]
      };
    });
    
    const missingDays = datesList.filter(dStr => !rangeMap[dStr]);
    
    successHandler({
      today: todayData,
      trend: trend,
      missingDays: missingDays
    });
  } catch (err) {
    if (failureHandler) failureHandler(err);
  }
};

function convertSheetsBackupToFirebase(backup) {
  const firebaseData = {
    users: {},
    company_profile: {},
    dropdown_options: {},
    rojnamcha: {},
    rojnamcha_details: {}
  };

  // 1. Convert DropdownOptions
  const dropdownRows = (backup.master && backup.master.DropdownOptions) || [];
  for (let row of dropdownRows) {
    if (row.length >= 3) {
      const section = row[0];
      const details = row[1];
      const defaultRate = parseFloat(row[2]) || 0;
      if (section && details) {
        const id = section + '_' + details.replace(/\//g, '_');
        firebaseData.dropdown_options[id] = { section, details, defaultRate };
      }
    }
  }

  // 2. Convert CompanyProfile
  const profileRows = (backup.master && backup.master.CompanyProfile) || [];
  const profileDoc = {
    companyName: 'SHIV SHAKTI HP GAS AGENCY',
    companyAddress: 'PANDAUL BAZAR, MADHUBANI-847234',
    companyGSTIN: '10AEYPK3674C2ZH',
    companyLogo: ''
  };
  for (let row of profileRows) {
    if (row.length >= 2) {
      const key = row[0];
      const val = row[1];
      if (key === 'CompanyName') profileDoc.companyName = val;
      else if (key === 'CompanyAddress') profileDoc.companyAddress = val;
      else if (key === 'CompanyGSTIN') profileDoc.companyGSTIN = val;
      else if (key === 'CompanyLogo') profileDoc.companyLogo = val;
      else if (key === 'MailDefaultRecipient') profileDoc.mailDefaultRecipient = val;
      else if (key === 'MailDefaultSubject') profileDoc.mailDefaultSubject = val;
      else if (key === 'MailDefaultBody') profileDoc.mailDefaultBody = val;
    }
  }
  firebaseData.company_profile['profile'] = profileDoc;

  // 3. Convert Users
  const userRows = (backup.master && backup.master.Users) || [];
  for (let row of userRows) {
    if (row.length >= 8) {
      const username = row[0];
      const passwordHash = row[1];
      const name = row[2];
      const email = row[3];
      const role = row[4];
      const status = row[5];
      const resetRequest = row[6] === true || row[6] === 'true';
      const createdAt = row[7];
      if (username) {
        const docId = username.toLowerCase();
        firebaseData.users[docId] = { username, passwordHash, name, email, role, status, resetRequest, createdAt };
      }
    }
  }

  // 4. Convert Rojnamcha
  const rojnamchaRows = backup.rojnamcha || [];
  for (let row of rojnamchaRows) {
    if (row.length >= 7) {
      let dateVal = row[0];
      if (dateVal) {
        const dateStr = dateVal.split('T')[0];
        firebaseData.rojnamcha[dateStr] = {
          date: dateStr,
          receiptTotal: parseFloat(row[1]) || 0,
          expenseTotal: parseFloat(row[2]) || 0,
          netBalance: parseFloat(row[3]) || 0,
          cashSendToHome: parseFloat(row[4]) || 0,
          cashDepositToBank: parseFloat(row[5]) || 0,
          closingCashInHand: parseFloat(row[6]) || 0,
          previousClosingCash: parseFloat(row[7]) || 0,
          cashSendToHomeNote: row[8] || '',
          cashDepositToBankNote: row[9] || ''
        };
      }
    }
  }

  // 5. Convert RojnamchaDetails
  const detailsRows = backup.rojnamchaDetails || [];
  for (let row of detailsRows) {
    if (row.length >= 7) {
      let dateVal = row[0];
      if (dateVal) {
        const dateStr = dateVal.split('T')[0];
        const section = row[1];
        const sl = parseInt(row[2]) || 1;
        const details = row[3];
        const rate = parseFloat(row[4]) || 0;
        const qty = parseFloat(row[5]) || 0;
        const amount = parseFloat(row[6]) || 0;
        const docId = dateStr + '_' + section + '_' + sl;
        firebaseData.rojnamcha_details[docId] = { date: dateStr, section, sl, details, rate, qty, amount };
      }
    }
  }

  return firebaseData;
}

window.firebase_importAllDataJSON = async function(args, successHandler, failureHandler) {
  try {
    const backupDataStr = args[0];
    const backup = JSON.parse(backupDataStr);
    if (!backup) {
      successHandler({ success: false, error: 'Invalid backup file format' });
      return;
    }
    
    let collectionsToImport = null;
    if (backup.master && (backup.rojnamcha || backup.rojnamchaDetails)) {
      // Convert Sheets format to Firebase format
      collectionsToImport = convertSheetsBackupToFirebase(backup);
    } else if (backup.data) {
      // Firebase format
      collectionsToImport = backup.data;
    } else {
      successHandler({ success: false, error: 'Invalid backup file format' });
      return;
    }
    
    for (let col in collectionsToImport) {
      // 1. Clear existing collection in chunks of 400
      const snap = await db.collection(col).get();
      const docs = [];
      snap.forEach(doc => docs.push(doc.ref));
      
      for (let i = 0; i < docs.length; i += 400) {
        const clearBatch = db.batch();
        const chunk = docs.slice(i, i + 400);
        chunk.forEach(ref => clearBatch.delete(ref));
        await clearBatch.commit();
      }
      
      // 2. Write new collection data in chunks of 400
      const colData = collectionsToImport[col];
      const keys = Object.keys(colData);
      
      for (let i = 0; i < keys.length; i += 400) {
        const writeBatch = db.batch();
        const chunkKeys = keys.slice(i, i + 400);
        chunkKeys.forEach(docId => {
          const ref = db.collection(col).doc(docId);
          writeBatch.set(ref, colData[docId]);
        });
        await writeBatch.commit();
      }
    }
    successHandler({ success: true });
  } catch (err) {
    successHandler({ success: false, error: err.toString() });
  }
};

      function resizeImageToMax(file, maxWidth, maxHeight, callback) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            // Maintain aspect ratio within maxWidth x maxHeight
            if (width > maxWidth || height > maxHeight) {
              const ratio = Math.min(maxWidth / width, maxHeight / height);
              width  = Math.round(width  * ratio);
              height = Math.round(height * ratio);
            }

            canvas.width  = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            // Fill white background so transparent PNGs compress well as JPEG
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);
            ctx.drawImage(img, 0, 0, width, height);

            // JPEG at 0.65 quality keeps size well under 50 000 characters
            const dataUrl = canvas.toDataURL('image/jpeg', 0.65);
            callback(dataUrl);
          };
          img.onerror = function() {
            showToast('Invalid image file', 'error');
            showLoading(false);
          };
          img.src = e.target.result;
        };
        reader.onerror = function() {
          showToast('Failed to read file', 'error');
          showLoading(false);
        };
        reader.readAsDataURL(file);
      }

        document.getElementById('display-date').innerText = formatDateReadable(dateStr);
        updateActiveSidebarItem(dateStr);
        
        showLoading(true, 'Loading ledger for ' + formatDateReadable(dateStr) + '...');
        
        google.script.run
          .withSuccessHandler(function(result) {
            if (result && !result.isNew) {
              populateLedger(result);
              showToast('Ledger loaded successfully', 'success');
            } else {
              resetLedgerForm();
              var cash = result ? (result.previousClosingCash || 0) : 0;
              applyPreviousClosingCash(dateStr, cash);
            }
            showLoading(false);
          })
          .withFailureHandler(function(err) {
            showLoading(false);
            showToast('Error loading ledger: ' + err.message, 'error');
          })
          .getRojnamchaData(dateStr);
      }

      function fetchPreviousClosingCash(dateStr) {
        google.script.run
          .withSuccessHandler(function(cash) {
            applyPreviousClosingCash(dateStr, cash);
          })
          .withFailureHandler(function(err) {
            showToast('Could not fetch previous closing cash: ' + err.message, 'error');
          })
          .getPreviousClosingCash(dateStr);
      }

      function loadDropdownOptions() {
        google.script.run
          .withSuccessHandler(function(options) {
            state.dropdownOptions = options;
            renderDropdownManagerList();
          })
          .withFailureHandler(function(err) {
            showToast('Error loading dropdown choices: ' + err.message, 'error');
          })
          .getDropdownOptions();
      }

      function loadExistingDates() {
        google.script.run
          .withSuccessHandler(function(dates) {
            state.existingDates = dates;
            renderHistoryList(dates);
            updateActiveSidebarItem(state.selectedDate);
          })
          .withFailureHandler(function(err) {
            showToast('Error loading history: ' + err.message, 'error');
          })
          .getExistingDates();
      }

      let showAllHistory = false;

      function renderHistoryList(dates) {
        const historyList = document.getElementById('history-list');
        if (!historyList) return;
        historyList.innerHTML = '';
        
        state.allDates = dates || [];
        
        const filterInput = document.getElementById('history-search');
        const filterVal = filterInput ? filterInput.value.toLowerCase().trim() : '';
        
        let filteredDates = state.allDates;
        if (filterVal) {
          filteredDates = state.allDates.filter(function(d) {
            const readable = formatDateReadable(d).toLowerCase();
            return readable.includes(filterVal) || d.includes(filterVal);
          });
        }
        
        let datesToRender = filteredDates;
        if (!showAllHistory && !filterVal) {
          datesToRender = filteredDates.slice(0, 5);
        }
        
        const toggleBtn = document.getElementById('history-toggle');
        if (toggleBtn) {
          if (filterVal) {
            toggleBtn.style.display = 'none';
          } else {
            toggleBtn.style.display = state.allDates.length > 5 ? 'inline' : 'none';
            toggleBtn.innerText = showAllHistory ? 'Show Less' : `Show All (${state.allDates.length})`;
          }
        }
        
        if (datesToRender.length === 0) {
          historyList.innerHTML = '<li style="padding: 1rem; text-align: center; color: #94a3b8; font-size: 0.85rem;">No matching records.</li>';
          return;
        }
        
        datesToRender.forEach(function(dateStr) {
          const li = document.createElement('li');
          li.className = 'history-item';
          li.dataset.date = dateStr;
          
          const displayDate = formatDateReadable(dateStr);
          li.innerHTML = `<span class="history-item-date">${displayDate}</span>`;
          
          li.addEventListener('click', function() {
            setLedgerDateInput(dateStr);
            handleDateChange(dateStr);
          });
          
          historyList.appendChild(li);
        });
      }
      
      window.toggleHistoryLimit = function() {
        showAllHistory = !showAllHistory;
        renderHistoryList(state.allDates);
      };
      
      window.filterHistoryList = function(val) {
        renderHistoryList(state.allDates);
      };

      function updateActiveSidebarItem(dateStr) {
        document.querySelectorAll('.history-item').forEach(item => {
          if (item.dataset.date === dateStr) {
            item.classList.add('active');
          } else {
            item.classList.remove('active');
          }
        });
      }

      function resetLedgerForm() {
        const receiptsTbody = document.getElementById('receipts-tbody');
        while (receiptsTbody.rows.length > 1) {
          receiptsTbody.deleteRow(1);
        }
        
        document.getElementById('r-details-1').value = 'CASH IN HAND';
        document.getElementById('r-amount-1').value = '0.00';
        
        const expensesTbody = document.getElementById('expenses-tbody');
        expensesTbody.innerHTML = '';
        
        document.getElementById('cash-home').value = '0.00';
        document.getElementById('cash-bank').value = '0.00';
        const hn = document.getElementById('cash-home-note'); if (hn) hn.value = '';
        const bn = document.getElementById('cash-bank-note'); if (bn) bn.value = '';
        
        // Reset breakdown state
        state.breakdowns = { home: [], bank: [] };
        state.currentBreakdownType = '';
        
        addReceiptRow();
        addReceiptRow();
        addExpenseRow();
        addExpenseRow();
        
        calculateAll();
      }

      function populateLedger(data) {
        if (!data) return;
        
        const summary = data.summary || {};
        const details = data.details || [];
        
        // Set reconciliation values safely with fallback to 0
        const cashHome = typeof summary.cashSendToHome === 'number' ? summary.cashSendToHome : 0;
        const cashBank = typeof summary.cashDepositToBank === 'number' ? summary.cashDepositToBank : 0;
        
        document.getElementById('cash-home').value = cashHome.toFixed(2);
        document.getElementById('cash-bank').value = cashBank.toFixed(2);
        
        const homeNoteEl = document.getElementById('cash-home-note');
        if (homeNoteEl) homeNoteEl.value = summary.cashSendToHomeNote || '';
        const bankNoteEl = document.getElementById('cash-bank-note');
        if (bankNoteEl) bankNoteEl.value = summary.cashDepositToBankNote || '';
        
        // Parse breakdowns from notes
        const parsedHome = parseMultipleTransfers(summary.cashSendToHomeNote || '');
        state.breakdowns.home = parsedHome.entries;
        
        const parsedBank = parseMultipleTransfers(summary.cashDepositToBankNote || '');
        state.breakdowns.bank = parsedBank.entries;
        
        const receiptsTbody = document.getElementById('receipts-tbody');
        while (receiptsTbody.rows.length > 1) {
          receiptsTbody.deleteRow(1);
        }
        
        const expensesTbody = document.getElementById('expenses-tbody');
        expensesTbody.innerHTML = '';
        
        details.forEach(function(row) {
          if (row.section === 'Receipt') {
            if (row.sl === 1) {
              document.getElementById('r-details-1').value = row.details || 'CASH IN HAND';
              const r1Amt = typeof row.amount === 'number' ? row.amount : 0;
              document.getElementById('r-amount-1').value = r1Amt.toFixed(2);
            } else {
              addReceiptRow(row.details || '', row.rate, row.qty);
            }
          } else if (row.section === 'Expense') {
            addExpenseRow(row.details || '', row.rate, row.qty);
          }
        });
        
        if (receiptsTbody.rows.length === 1) addReceiptRow();
        if (expensesTbody.rows.length === 0) addExpenseRow();
        
        calculateAll();
      }

        const index = tbody.rows.length + 1;
        
        const tr = document.createElement('tr');
        tr.id = 'receipt-row-' + index;

          <td class="col-details">
            <div class="autocomplete-container">

          <td class="col-rate">
            <input type="number" id="r-rate-${index}" class="table-input table-input-number" value="${rate}" step="0.01" placeholder="0.00">
          </td>
          <td class="col-qty">
            <input type="number" id="r-qty-${index}" class="table-input table-input-number" value="${qty}" placeholder="0">
          </td>
          <td class="col-amount">
            <span id="r-amount-display-${index}" class="amount-text">₹0.00</span>
          </td>
          <td class="col-action" style="text-align: center;">
            <button class="btn-delete-row" onclick="deleteReceiptRow(this)" title="Delete Row">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>

      function addExpenseRow(details = '', rate = '', qty = '') {
        const tbody = document.getElementById('expenses-tbody');
        const index = tbody.rows.length + 1;
        
        const tr = document.createElement('tr');
        tr.id = 'expense-row-' + index;
        tr.innerHTML = `
          <td class="col-sl"><span class="sl-badge">${index}</span></td>
          <td class="col-details">
            <div class="autocomplete-container">
              <input type="text" id="e-details-${index}" class="table-input details-autocomplete" value="${details}" placeholder="Select or type details..." autocomplete="off">
            </div>
          </td>
          <td class="col-rate">
            <input type="number" id="e-rate-${index}" class="table-input table-input-number" value="${rate}" step="0.01" placeholder="0.00">
          </td>
          <td class="col-qty">
            <input type="number" id="e-qty-${index}" class="table-input table-input-number" value="${qty}" placeholder="0">
          </td>
          <td class="col-amount">
            <span id="e-amount-display-${index}" class="amount-text">₹0.00</span>

            <button class="btn-delete-row" onclick="deleteExpenseRow(this)" title="Delete Row">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>

      function deleteReceiptRow(buttonEl) {
        const row = buttonEl.closest('tr');
        row.remove();
        renumberRows('receipts-tbody', 'Receipt');
        calculateAll();
      }

      function renumberRows(tbodyId, section) {
        const tbody = document.getElementById(tbodyId);
        const rows = tbody.rows;
        const prefix = section === 'Receipt' ? 'r' : 'e';
        const startIdx = section === 'Receipt' ? 1 : 0;
        
        for (let i = startIdx; i < rows.length; i++) {
          const sl = i + 1;
          const row = rows[i];
          row.querySelector('.sl-badge').innerText = sl;
          row.querySelector('.details-autocomplete').id = `${prefix}-details-${sl}`;
          row.querySelector('.col-rate input').id = `${prefix}-rate-${sl}`;
          row.querySelector('.col-qty input').id = `${prefix}-qty-${sl}`;
          row.querySelector('.col-amount span').id = `${prefix}-amount-display-${sl}`;
        }
      }

      function deleteExpenseRow(buttonEl) {
        const row = buttonEl.closest('tr');
        row.remove();
        renumberRows('expenses-tbody', 'Expense');
        calculateAll();
      }

      function bindRowEvents(section, sl) {
        const prefix = section === 'Receipt' ? 'r' : 'e';
        const rateInput = document.getElementById(`${prefix}-rate-${sl}`);
        const qtyInput = document.getElementById(`${prefix}-qty-${sl}`);
        const detailsInput = document.getElementById(`${prefix}-details-${sl}`);
        
        [rateInput, qtyInput].forEach(input => {
          input.addEventListener('input', calculateAll);
          input.addEventListener('change', function() {
            const val = parseFloat(this.value);
            if (!isNaN(val) && this.id.includes('rate')) {
              this.value = val.toFixed(2);
            }
          });
        });
        
        detailsInput.addEventListener('focus', function() {
          showAutocompleteList(this, section, sl);
        });
        detailsInput.addEventListener('input', function() {
          showAutocompleteList(this, section, sl);
        });
        detailsInput.addEventListener('keydown', function(e) {
          const container = this.parentElement;
          let list = container.querySelector('.autocomplete-list');
          if (!list) return;
          
          let items = list.querySelectorAll('.autocomplete-item');
          if (items.length === 0) return;
          
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            state.activeAutocompleteIndex++;
            if (state.activeAutocompleteIndex >= items.length) state.activeAutocompleteIndex = 0;
            highlightAutocompleteItem(items);
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            state.activeAutocompleteIndex--;
            if (state.activeAutocompleteIndex < 0) state.activeAutocompleteIndex = items.length - 1;
            highlightAutocompleteItem(items);
          } else if (e.key === 'Enter') {
            e.preventDefault();
            if (state.activeAutocompleteIndex > -1 && items[state.activeAutocompleteIndex]) {
              items[state.activeAutocompleteIndex].click();
            }
          } else if (e.key === 'Escape') {
            closeAllAutocompleteLists();
          }
        });
      }

      function showAutocompleteList(inputEl, section, sl) {
        closeAllAutocompleteLists();
        state.activeAutocompleteIndex = -1;
        
        const query = inputEl.value.toLowerCase().trim();
        const listKey = section === 'Receipt' ? 'receipts' : 'expenses';
        const options = state.dropdownOptions[listKey];
        
        const filtered = options.filter(opt => opt.details.toLowerCase().includes(query));
        if (filtered.length === 0) return;
        
        const container = inputEl.parentElement;
        const list = document.createElement('ul');
        list.className = 'autocomplete-list';
        
        filtered.forEach(function(item) {
          const li = document.createElement('li');
          li.className = 'autocomplete-item';
          li.innerHTML = `
            <span class="autocomplete-item-details">${item.details}</span>
            <span class="autocomplete-item-rate">₹${item.defaultRate.toFixed(2)}</span>
          `;
          
          li.addEventListener('click', function() {
            inputEl.value = item.details;
            const prefix = section === 'Receipt' ? 'r' : 'e';
            const rateInput = document.getElementById(`${prefix}-rate-${sl}`);
            const qtyInput = document.getElementById(`${prefix}-qty-${sl}`);
            
            rateInput.value = item.defaultRate.toFixed(2);
            if (!qtyInput.value) {
              qtyInput.value = '1';
            }
            
            calculateAll();
            closeAllAutocompleteLists();
            qtyInput.focus();
          });
          list.appendChild(li);
        });
        container.appendChild(list);
      }

      function highlightAutocompleteItem(items) {
        items.forEach((item, idx) => {
          if (idx === state.activeAutocompleteIndex) {
            item.style.backgroundColor = '#f1f5f9';
            item.scrollIntoView({ block: 'nearest' });
          } else {
            item.style.backgroundColor = '';
          }
        });
      }

      function closeAllAutocompleteLists() {
        document.querySelectorAll('.autocomplete-list').forEach(list => list.remove());
      }

      function calculateAll() {
        let receiptsTotal = 0;
        let expensesTotal = 0;
        
        const receiptsTbody = document.getElementById('receipts-tbody');
        const rRows = receiptsTbody.rows;
        const r1Amt = parseFloat(document.getElementById('r-amount-1').value) || 0;
        receiptsTotal += r1Amt;
        
        for (let i = 1; i < rRows.length; i++) {
          const sl = i + 1;
          const rateEl = document.getElementById('r-rate-' + sl);
          const qtyEl = document.getElementById('r-qty-' + sl);
          
          if (rateEl && qtyEl) {
            const rate = parseFloat(rateEl.value) || 0;
            const qty = parseFloat(qtyEl.value) || 0;
            const amt = rate * qty;
            updateRowAmountDisplay('Receipt', sl, amt);
            receiptsTotal += amt;
          }
        }
        
        const expensesTbody = document.getElementById('expenses-tbody');
        const eRows = expensesTbody.rows;
        
        for (let j = 0; j < eRows.length; j++) {
          const sl = j + 1;
          const rateEl = document.getElementById('e-rate-' + sl);
          const qtyEl = document.getElementById('e-qty-' + sl);
          
          if (rateEl && qtyEl) {
            const rate = parseFloat(rateEl.value) || 0;
            const qty = parseFloat(qtyEl.value) || 0;
            const amt = rate * qty;
            updateRowAmountDisplay('Expense', sl, amt);
            expensesTotal += amt;
          }
        }
        
        const netBalance = receiptsTotal - expensesTotal;
        const cashHome = parseFloat(document.getElementById('cash-home').value) || 0;
        const cashBank = parseFloat(document.getElementById('cash-bank').value) || 0;
        const closingCash = netBalance - (cashHome + cashBank);
        
        document.getElementById('receipts-total-val').innerText = '₹' + receiptsTotal.toLocaleString('en-IN', { minimumFractionDigits: 2 });
        document.getElementById('expenses-total-val').innerText = '₹' + expensesTotal.toLocaleString('en-IN', { minimumFractionDigits: 2 });
        
        document.getElementById('net-balance-val').innerText = netBalance.toLocaleString('en-IN', { minimumFractionDigits: 2 });
        document.getElementById('closing-cash-val').innerText = closingCash.toLocaleString('en-IN', { minimumFractionDigits: 2 });
        
        const closingCashEl = document.getElementById('closing-cash-val');
        if (closingCash < 0) {
          closingCashEl.style.color = 'var(--expense-primary)';
        } else {
          closingCashEl.style.color = 'var(--receipt-primary)';
        }
      }

      function updateRowAmountDisplay(section, sl, val) {
        const prefix = section === 'Receipt' ? 'r' : 'e';
        const display = document.getElementById(`${prefix}-amount-display-${sl}`);
        if (display) {
          display.innerText = val > 0 ? '₹' + val.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '₹0.00';
        }
      }

      function saveLedger() {
        if (state.isSaving) return;
        
        if (!state.selectedDate) {
          showToast('Please select a date first', 'error');
          return;
        }
        
        state.isSaving = true;
        showLoading(true, 'Saving ledger to local storage...');
        
        const receiptsTotal = parseFloat(document.getElementById('receipts-total-val').innerText.replace(/[^\d.]/g, '')) || 0;
        const expensesTotal = parseFloat(document.getElementById('expenses-total-val').innerText.replace(/[^\d.]/g, '')) || 0;
        const netBalance = parseFloat(document.getElementById('net-balance-val').innerText.replace(/[^\d.-]/g, '')) || 0;
        const cashHome = parseFloat(document.getElementById('cash-home').value) || 0;
        const cashBank = parseFloat(document.getElementById('cash-bank').value) || 0;
        const closingCash = parseFloat(document.getElementById('closing-cash-val').innerText.replace(/[^\d.-]/g, '')) || 0;
        
        const cashHomeNote = document.getElementById('cash-home-note') ? document.getElementById('cash-home-note').value.trim() : '';
        const cashBankNote = document.getElementById('cash-bank-note') ? document.getElementById('cash-bank-note').value.trim() : '';
        
        const summary = {
          receiptTotal: receiptsTotal,
          expenseTotal: expensesTotal,
          netBalance: netBalance,
          cashSendToHome: cashHome,
          cashDepositToBank: cashBank,
          closingCashInHand: closingCash,
          cashSendToHomeNote: cashHomeNote,
          cashDepositToBankNote: cashBankNote
        };
        
        const details = [];
        const r1Details = document.getElementById('r-details-1').value;
        const r1Amt = parseFloat(document.getElementById('r-amount-1').value) || 0;
        if (r1Details.trim()) {
          details.push({ section: 'Receipt', sl: 1, details: r1Details, rate: 0, qty: 1, amount: r1Amt });
        }
        
        const rRows = document.getElementById('receipts-tbody').rows;
        for (let i = 1; i < rRows.length; i++) {
          const sl = i + 1;
          const dVal = document.getElementById('r-details-' + sl).value;
          const rVal = parseFloat(document.getElementById('r-rate-' + sl).value) || 0;
          const qVal = parseFloat(document.getElementById('r-qty-' + sl).value) || 0;
          const aVal = rVal * qVal;
          if (dVal.trim()) {
            details.push({ section: 'Receipt', sl: sl, details: dVal, rate: rVal, qty: qVal, amount: aVal });
          }
        }
        
        const eRows = document.getElementById('expenses-tbody').rows;
        for (let j = 0; j < eRows.length; j++) {
          const sl = j + 1;
          const dVal = document.getElementById('e-details-' + sl).value;
          const rVal = parseFloat(document.getElementById('e-rate-' + sl).value) || 0;
          const qVal = parseFloat(document.getElementById('e-qty-' + sl).value) || 0;
          const aVal = rVal * qVal;
          if (dVal.trim()) {
            details.push({ section: 'Expense', sl: sl, details: dVal, rate: rVal, qty: qVal, amount: aVal });
          }
        }
        
        google.script.run
          .withSuccessHandler(function(response) {
            state.isSaving = false;
            showLoading(false);
            if (response.success) {
              showToast('Ledger saved successfully!', 'success');
              loadExistingDates();
              setTimeout(function() {
                showCustomConfirm(
                  'Daily Ledger saved successfully. Do you want to email the PDF copy?',
                  function() {
                    openEmailModal('daily');
                  },
                  {
                    type: 'success',
                    title: 'Ledger Saved',
                    okText: 'Yes, Email PDF',
                    cancelText: 'No, Close'
                  }
                );
              }, 600);
            } else {
              showToast('Save failed', 'error');
            }
          })
          .withFailureHandler(function(err) {
            state.isSaving = false;
            showLoading(false);
            showToast('Error: ' + err.message, 'error');
          })
          .saveRojnamcha(state.selectedDate, summary, details);
      }

      function handleAddDropdownOption() {
        const section = document.getElementById('option-section').value;
        const details = document.getElementById('option-details').value.trim();
        const rate = parseFloat(document.getElementById('option-rate').value) || 0;
        
        if (!details) {
          showToast('Details description cannot be empty', 'error');
          return;
        }
        
        showLoading(true, 'Adding option...');
        google.script.run
          .withSuccessHandler(function() {
            showLoading(false);
            document.getElementById('option-details').value = '';
            document.getElementById('option-rate').value = '';
            showToast('Option added successfully', 'success');
            loadDropdownOptions();
          })
          .withFailureHandler(function(err) {
            showLoading(false);
            showToast('Failed to add option: ' + err.message, 'error');
          })
          .saveDropdownOption(section, details, rate);
      }

      // Show Custom Confirm Modal Dialog with dynamic styling/texts
      function showCustomConfirm(message, callback, options = {}) {
        confirmCallback = callback;
        document.getElementById('confirm-modal-message').textContent = message;
        
        const modal = document.getElementById('confirm-modal');
        const modalContent = modal.querySelector('.modal-content');
        const modalHeader = modal.querySelector('.modal-header');
        const modalTitle = modal.querySelector('.modal-header h3');
        const btnOk = document.getElementById('btn-confirm-ok');
        const btnCancel = document.getElementById('btn-confirm-cancel');
        
        // Defaults: Delete confirmation style
        const type = options.type || 'delete'; // delete, success, info, warning
        const title = options.title || 'Confirm Delete';
        const okText = options.okText || 'Delete';
        const cancelText = options.cancelText || 'Cancel';
        
        // Update texts
        if (modalTitle) {
          const textNode = Array.from(modalTitle.childNodes).find(n => n.nodeType === Node.TEXT_NODE);
          if (textNode) {
            textNode.textContent = ' ' + title;
          } else {
            modalTitle.textContent = title;
          }
        }
        
        btnOk.innerText = okText;
        btnCancel.innerText = cancelText;
        
        // Apply styling based on type
        if (type === 'delete') {
          modalContent.style.borderTop = '4px solid var(--expense-primary)';
          modalHeader.style.backgroundColor = 'var(--expense-bg)';
          modalHeader.style.borderBottom = '1px solid var(--expense-border)';
          if (modalTitle) modalTitle.style.color = 'var(--expense-text)';
          btnOk.className = 'btn-new';
          btnOk.style.backgroundColor = 'var(--expense-primary)';
          btnOk.style.boxShadow = '0 4px 6px -1px rgba(239, 68, 68, 0.2)';
        } else if (type === 'success') {

      let promptCallback = null;

      // Show Custom Prompt Modal Dialog
      function showCustomPrompt(message, defaultValue, callback, options = {}) {
        promptCallback = callback;
        
        const modal = document.getElementById('prompt-modal');
        const input = document.getElementById('prompt-modal-input');
        const titleEl = document.getElementById('prompt-modal-title');
        const labelEl = document.getElementById('prompt-modal-input-label');
        const msgEl = document.getElementById('prompt-modal-message');
        const btnOk = document.getElementById('btn-prompt-ok');
        const btnCancel = document.getElementById('btn-prompt-cancel');
        
        const title = options.title || 'Input Required';
        const label = options.label || 'Value';
        const type = options.type || 'text'; // text, password
        const okText = options.okText || 'Submit';
        const cancelText = options.cancelText || 'Cancel';
        
        // Set content
        if (titleEl) {
          const textNode = Array.from(titleEl.childNodes).find(n => n.nodeType === Node.TEXT_NODE);
          if (textNode) {
            textNode.textContent = ' ' + title;
          } else {
            titleEl.textContent = title;
          }
        }
        if (labelEl) labelEl.innerText = label;
        if (msgEl) msgEl.innerText = message;
        
        input.type = type;
        input.value = defaultValue || '';
        input.placeholder = options.placeholder || `Enter ${label.toLowerCase()}...`;
        
        btnOk.innerText = okText;
        btnCancel.innerText = cancelText;
        
        modal.classList.add('active');
        
        // Auto-focus input
        setTimeout(() => input.focus(), 150);
      }

      function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        if (!container) return;
        
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        
        let title = 'Information';
        let iconSvg = '';
        
        if (type === 'success') {
          title = 'Success';
          iconSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
        } else if (type === 'error') {
          title = 'Error';
          iconSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
        } else if (type === 'warning') {
          title = 'Warning';
          iconSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`;
        } else {
          title = 'Info';
          iconSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
        }
        
        toast.innerHTML = `
          <div class="toast-icon">${iconSvg}</div>
          <div class="toast-content">
            <div class="toast-title">${title}</div>
            <div class="toast-message">${message}</div>
          </div>
          <button class="toast-close" aria-label="Close message">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
          <div class="toast-progress"></div>
        `;
        
        toast.querySelector('.toast-close').addEventListener('click', function() {
          dismissToast(toast);
        });
        
        container.appendChild(toast);
        
        const timeoutId = setTimeout(function() {
          dismissToast(toast);
        }, 4000);
        
        toast.dataset.timeoutId = timeoutId;
      }

      function dismissToast(toast) {
        if (toast.classList.contains('dismissed')) return;
        toast.classList.add('dismissed');
        
        const timeoutId = toast.dataset.timeoutId;
        if (timeoutId) {
          clearTimeout(parseInt(timeoutId));
        }
        
        toast.style.animation = 'toastSlideOut 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
        setTimeout(function() {
          toast.remove();
        }, 300);
      }

      function formatDateReadable(dateStr) {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr;
        const day = date.getDate();
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        return `${day}-${months[date.getMonth()]}-${date.getFullYear()}`;
      }

      function formatCurrency(val) {
        const num = parseFloat(val) || 0;
        return '₹' + num.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

          document.querySelectorAll('.mobile-nav-btn').forEach(btn => {

              startInput.value = firstDay;
              endInput.value = lastDay;

            const y = today.getFullYear();

            startInput.value = firstDay;
            endInput.value = lastDay;
          }

      // Bank Account Ledger Functions
      function updateBankDateRangeLabel() {
        const startVal = document.getElementById('bank-start-date').value;
        const endVal = document.getElementById('bank-end-date').value;
        const dateDisplay = document.getElementById('display-date');
        if (startVal && endVal) {
          dateDisplay.innerText = `${formatDateReadable(startVal)} to ${formatDateReadable(endVal)}`;
        } else {
          dateDisplay.innerText = 'No Range Selected';
        }
      }

      function generateBankLedger() {
        const startDate = document.getElementById('bank-start-date').value;
        const endDate = document.getElementById('bank-end-date').value;
        const bankFilter = document.getElementById('bank-ledger-account-filter').value;
        
        if (!startDate || !endDate) {
          showToast('Please select both Start and End dates', 'error');
          return;
        }
        
        if (new Date(startDate) > new Date(endDate)) {
          showToast('Start Date cannot be after End Date', 'error');
          return;
        }
        
        showLoading(true, 'Generating bank statement...');
        google.script.run
          .withSuccessHandler(function(res) {
            showLoading(false);
            renderBankLedger(res);
            updateBankDateRangeLabel();
            
            // Refresh balances
            renderBankAccountsList(res.accounts);
            
            showToast(`Bank statement compiled successfully with ${res.records.length} deposits.`, 'success');
          })
          .withFailureHandler(function(err) {
            showLoading(false);
            showToast('Failed to compile bank report: ' + err.message, 'error');
          })
          .getBankLedgerData(startDate, endDate, bankFilter);
      }

      function handleSaveBankDeposit() {
        const id = document.getElementById('bank-deposit-id').value;
        const date = document.getElementById('bank-deposit-date').value;
        const select = document.getElementById('bank-deposit-account-select');
        const bankAccountId = select.value;
        const bankAccountName = select.options[select.selectedIndex] ? select.options[select.selectedIndex].text : 'Default Bank';
        const amount = parseFloat(document.getElementById('bank-deposit-amount').value) || 0;
        const note = document.getElementById('bank-deposit-note').value;
        
        if (!date || !bankAccountId || amount <= 0) {
          showToast('Please fill all required fields correctly', 'error');
          return;
        }
        
        showLoading(true, id ? 'Updating deposit entry...' : 'Saving deposit entry...');
        google.script.run
          .withSuccessHandler(function(res) {
            showLoading(false);
            document.getElementById('bank-deposit-modal').classList.remove('active');
            showToast(id ? 'Deposit entry updated successfully!' : 'Deposit entry saved successfully!', 'success');
            document.getElementById('bank-deposit-form').reset();
            loadBankAccounts();
            generateBankLedger();
          })
          .withFailureHandler(function(err) {
            showLoading(false);
            showToast('Failed to save deposit: ' + err.message, 'error');
          })
          .saveBankDeposit(id, date, bankAccountId, bankAccountName, amount, note);
      }

      window.handleBankLogoChange = function(input) {
        const file = input.files[0];
        if (!file) return;
        
        if (file.size > 256000) {
          showToast('Logo image must be smaller than 250KB', 'error');
          input.value = '';
          return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
          currentBankAccountLogoBase64 = e.target.result;
          const preview = document.getElementById('bank-account-logo-preview');
          preview.innerHTML = `<img src="${currentBankAccountLogoBase64}" style="width:100%; height:100%; object-fit:cover;">`;
          document.getElementById('btn-bank-logo-remove').style.display = 'inline-block';
        };
        reader.readAsDataURL(file);
      };

      window.handleSaveBankAccount = function() {
        const id = document.getElementById('bank-account-edit-id').value;
        const name = document.getElementById('bank-account-name-input').value.trim();
        const number = document.getElementById('bank-account-number-input').value.trim();
        const ifsc = document.getElementById('bank-account-ifsc-input').value.trim();
        const branch = document.getElementById('bank-account-branch-input').value.trim();
        
        if (!name || !number || !ifsc || !branch) {
          showToast('Please fill all required fields correctly', 'error');
          return;
        }
        
        showLoading(true, id ? 'Updating bank account...' : 'Adding bank account...');
        google.script.run
          .withSuccessHandler(function() {
            showLoading(false);
            document.getElementById('bank-account-modal').classList.remove('active');
            showToast(id ? `Bank account "${name}" updated.` : `Bank account "${name}" added.`, 'success');
            loadBankAccounts();

        if (confirm(`Are you sure you want to delete bank account "${name}"?`)) {
          showLoading(true, 'Deleting bank account...');
          google.script.run
            .withSuccessHandler(function() {
              showLoading(false);
              showToast(`Bank account "${name}" deleted successfully.`, 'success');
              loadBankAccounts();
              generateBankLedger();
            })
            .withFailureHandler(function(err) {
              showLoading(false);
              showToast(err.message, 'error');
            })
            .deleteBankAccount(id);
        }

      function loadBankAccounts() {
        google.script.run
          .withSuccessHandler(function(accounts) {
            state.bankAccounts = accounts;
            
            // Populate selectors
            const selectModal = document.getElementById('bank-deposit-account-select');
            const selectFilter = document.getElementById('bank-ledger-account-filter');
            
            const prevModalVal = selectModal.value;
            const prevFilterVal = selectFilter.value;
            
            selectModal.innerHTML = '';
            selectFilter.innerHTML = '<option value="">All Bank Accounts</option>';
            
            accounts.forEach(acc => {
              const opt1 = document.createElement('option');
              opt1.value = acc.id;
              opt1.innerText = acc.name;
              selectModal.appendChild(opt1);
              
              const opt2 = document.createElement('option');
              opt2.value = acc.id;
              opt2.innerText = acc.name;
              selectFilter.appendChild(opt2);
            });
            
            if (prevModalVal) selectModal.value = prevModalVal;
            if (prevFilterVal) selectFilter.value = prevFilterVal;
            
            renderBankAccountsList(accounts);
          })
          .getBankAccounts();
      }

      let activeBankLedgerData = null;
      function renderBankLedger(res) {
        activeBankLedgerData = res;
        
        document.getElementById('bank-stat-total-alltime').innerText = formatCurrency(res.totalAllTime);
        document.getElementById('bank-stat-total-range').innerText = formatCurrency(res.totalRange);
        
        const countEl = document.getElementById('bank-record-count');
        if (countEl) {
          countEl.innerText = res.records.length + ' deposit' + (res.records.length !== 1 ? 's' : '');
        }
        
        const tbody = document.getElementById('bank-ledger-tbody');
        tbody.innerHTML = '';

      // Online payment keyword detection
      const ONLINE_KEYWORDS = ['online', 'gpay', 'phonepe', 'paytm', 'upi', 'digital', 'neft', 'rtgs', 'imps', 'bhim', 'netbanking', 'internet pay', 'net pay'];

      function isOnlinePayment(details) {
        if (!details) return false;
        const lower = details.toLowerCase();
        return ONLINE_KEYWORDS.some(kw => lower.includes(kw));
      }

      // Convert number to Indian words (crore/lakh)
      function convertNumberToWords(num) {
        if (num === 0) return 'Zero';
        const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine',
                      'Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen',
                      'Seventeen', 'Eighteen', 'Nineteen'];
        const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];

        function convertChunk(n) {
          if (n === 0) return '';
          if (n < 20) return ones[n];
          if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 ? ' ' + ones[n % 10] : '');
          return ones[Math.floor(n / 100)] + ' Hundred' + (n % 100 ? ' ' + convertChunk(n % 100) : '');
        }

        const intPart = Math.floor(Math.abs(num));
        const decPart = Math.round((Math.abs(num) - intPart) * 100);

        let result = '';
        const crores = Math.floor(intPart / 10000000);
        const lakhs = Math.floor((intPart % 10000000) / 100000);
        const thousands = Math.floor((intPart % 100000) / 1000);
        const remainder = intPart % 1000;

        if (crores > 0) result += convertChunk(crores) + ' Crore ';
        if (lakhs > 0) result += convertChunk(lakhs) + ' Lakh ';
        if (thousands > 0) result += convertChunk(thousands) + ' Thousand ';
        if (remainder > 0) result += convertChunk(remainder);

        result = result.trim();
        if (decPart > 0) result += ' and ' + convertChunk(decPart) + ' Paise';
        return (num < 0 ? 'Minus ' : '') + result;
      }

      function parseDenominationsFromNote(noteStr) {
        if (!noteStr) return null;
        
        // Check if it's a breakdown note
        if (noteStr.startsWith('[Breakdown:')) {
          const parsedMultiple = parseMultipleTransfers(noteStr);
          const mergedCounts = {};
          let grandTotal = 0;
          let hasDenom = false;
          
          parsedMultiple.entries.forEach(entry => {
            const subParsed = parseDenominationsFromNote(entry.note);
            if (subParsed) {
              hasDenom = true;
              subParsed.breakdown.forEach(item => {
                const label = item.label;
                const count = item.count;
                const total = item.total;
                
                if (!mergedCounts[label]) {
                  mergedCounts[label] = { label: label, count: 0, total: 0 };
                }
                mergedCounts[label].count += count;
                mergedCounts[label].total += total;
                grandTotal += total;
              });
            }
          });
          
          if (!hasDenom) return null;
          
          const breakdownArray = Object.keys(mergedCounts).map(k => mergedCounts[k]);
          breakdownArray.sort((a, b) => {
            if (a.label === 'Coins') return 1;
            if (b.label === 'Coins') return -1;
            const aVal = parseFloat(a.label.replace('₹', ''));
            const bVal = parseFloat(b.label.replace('₹', ''));
            return bVal - aVal;
          });
          
          return {
            breakdown: breakdownArray,
            total: grandTotal,
            cleanNote: parsedMultiple.generalNote || ''
          };
        }
        
        let breakdownStr = '';
        let cleanNote = '';
        const bracketMatch = noteStr.match(/^\[(.*?)\](.*)$/);
        
        if (bracketMatch) {
          breakdownStr = bracketMatch[1];
          cleanNote = bracketMatch[2].trim();
        } else {
          // Try to match direct style: 500x600, 200x139 Note
          const directMatch = noteStr.match(/^((?:\s*(?:\d+|coins)x\d+\s*)(?:,\s*(?:\d+|coins)x\d+\s*)*)(.*)$/i);
          if (directMatch) {
            breakdownStr = directMatch[1];
            cleanNote = directMatch[2].trim();
          } else {
            return null;
          }
        }
        
        const items = breakdownStr.split(',').map(s => s.trim());
        const parsed = [];
        let grandTotal = 0;
        
        items.forEach(item => {
          const parts = item.split('x').map(s => s.trim());
          if (parts.length === 2) {
            const isCoin = parts[0].toLowerCase() === 'coins';
            const denomVal = isCoin ? 1 : parseFloat(parts[0]);
            const countVal = parseInt(parts[1]);
            if (!isNaN(denomVal) && !isNaN(countVal)) {
              const total = denomVal * countVal;
              grandTotal += total;
              parsed.push({
                label: isCoin ? 'Coins' : '₹' + denomVal,
                count: countVal,
                total: total
              });
            }
          }
        });
        if (parsed.length === 0) return null;
        return {
          breakdown: parsed,
          total: grandTotal,
          cleanNote: cleanNote
        };
      }

      function showSlipModal(type, date, amount, note, slipIndex) {
        state.currentSlipType = type;
        state.currentSlipDate = date;
        state.currentSlipAmount = amount;
        state.currentSlipNote = note;
        state.currentSlipIndex = slipIndex;
